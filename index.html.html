<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖糖與果果的夢想森林 🌳</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Firebase SDK (ESM 模組) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================================
        // 請在此替換為您的 Firebase Config (從 Firebase Console 取得)
        // ==========================================================
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 將 Firebase 方法掛載到 window，讓下方的 React 可以存取
        window.fb = { db, auth, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFCF8; overflow-x: hidden; }
        
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 隱藏原生日期選擇器的預設圖示以進行美化 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 自定義 Icon 組件 (內建 SVG)
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const icons = {
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                ShieldHeart: (
                    <React.Fragment>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        <path d="M12 14.5c.8-1 2.5-1.4 3-1 .6.4.5 1.5 0 2.2-1 1.3-3 2.8-3 2.8s-2-1.5-3-2.8c-.5-.7-.6-1.8 0-2.2.5-.4 2.2 0 3 1z" fill="currentColor" fillOpacity="0.3" />
                    </React.Fragment>
                ),
                Plus: <path d="M5 12h14m-7-7v14" />,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 9v4m4-4v4" />,
                CheckCircle2: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="m9 12 2 2 4-4" />
                    </React.Fragment>
                ),
                MapPin: (
                    <React.Fragment>
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                        <circle cx="12" cy="10" r="3" />
                    </React.Fragment>
                ),
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                Coffee: (
                    <React.Fragment>
                        <path d="M17 8h1a4 4 0 1 1 0 8h-1M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8Z" />
                        <line x1="6" y1="2" x2="6" y2="4" />
                        <line x1="10" y1="2" x2="10" y2="4" />
                        <line x1="14" y1="2" x2="14" y2="4" />
                    </React.Fragment>
                ),
                Rocket: (
                    <React.Fragment>
                        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09Z" />
                        <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z" />
                    </React.Fragment>
                ),
                Cake: (
                    <React.Fragment>
                        <path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8" />
                        <path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1" />
                        <path d="M2 21h20" />
                        <path d="M7 8v3" />
                        <path d="M12 8v3" />
                        <path d="M17 8v3" />
                    </React.Fragment>
                ),
                Calendar: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </React.Fragment>
                ),
                Droplets: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                Wind: (
                    <React.Fragment>
                        <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2" />
                        <path d="M9.6 4.6A2 2 0 1 1 11 8H2" />
                        <path d="M12.6 19.4A2 2 0 1 0 14 16H2" />
                    </React.Fragment>
                ),
                Flower2: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="3" />
                        <path d="M12 7V3" />
                        <path d="M12 21v-4" />
                        <path d="M7 12H3" />
                        <path d="M21 12h-4" />
                    </React.Fragment>
                ),
                TreePine: (
                    <React.Fragment>
                        <path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-2l3.3-3.7a1 1 0 0 1 1.4 0L12 13l2.3-2.7a1 1 0 0 1 1.4 0L19 14h-2Z" />
                        <path d="M12 22v-3" />
                    </React.Fragment>
                ),
                BookOpen: (
                    <React.Fragment>
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </React.Fragment>
                ),
                HelpCircle: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </React.Fragment>
                ),
                User: (
                    <React.Fragment>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </React.Fragment>
                ),
                Edit3: (
                    <React.Fragment>
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </React.Fragment>
                ),
                Save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                    </React.Fragment>
                ),
                X: (
                    <React.Fragment>
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </React.Fragment>
                ),
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />
            };

            return (
                <svg
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill={fill}
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const appId = 'couple-dream-forest-v1';

        const PARTNERS = {
            A: { id: 'A', displayName: '糖糖', color: 'rose', accent: 'bg-rose-400', border: 'border-rose-200', text: 'text-rose-400', bottle: 'bg-rose-50/80', shadow: 'shadow-rose-100' },
            B: { id: 'B', displayName: '果果', color: 'sky', accent: 'bg-sky-400', border: 'border-sky-200', text: 'text-sky-400', bottle: 'bg-sky-50/80', shadow: 'shadow-sky-100' }
        };

        const CATEGORIES = [
            { id: 'date', label: '約會', icon: 'Coffee', color: 'text-rose-300' },
            { id: 'travel', label: '旅行', icon: 'MapPin', color: 'text-teal-300' },
            { id: 'future', label: '未來', icon: 'Rocket', color: 'text-purple-300' },
        ];

        const getDaysUntil = (dateStr) => {
            if (!dateStr) return null;
            const now = new Date();
            const date = new Date(dateStr);
            date.setFullYear(now.getFullYear());
            if (date < now) date.setFullYear(now.getFullYear() + 1);
            return Math.ceil(Math.abs(date - now) / (1000 * 60 * 60 * 24));
        };

        // --- 小檔案組件 ---
        const ProfileCard = ({ side, data, onSave }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [tempData, setTempData] = useState(data || {});
            const config = PARTNERS[side];

            useEffect(() => { setTempData(data || {}); }, [data]);

            const handleSave = () => { onSave(side, tempData); setIsEditing(false); };

            return (
                <div className={`flex-1 w-full bg-white rounded-[2.5rem] p-8 border-2 transition-all ${config.border} ${config.shadow} shadow-xl relative mb-4`}>
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-4">
                            <div className={`w-12 h-12 rounded-[1.2rem] ${config.accent} flex items-center justify-center text-white shadow-lg`}>
                                <Icon name="ShieldHeart" size={24} />
                            </div>
                            <div>
                                <h3 className={`font-black text-xl ${config.text}`}>{config.displayName}</h3>
                                <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Forest Guardian</p>
                            </div>
                        </div>
                        <button onClick={() => setIsEditing(!isEditing)} className="p-2 text-slate-300 hover:text-emerald-500 transition-colors">
                            {isEditing ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}
                        </button>
                    </div>

                    <div className="grid grid-cols-1 gap-4">
                        {[
                            { label: '身高 (cm)', key: 'height' },
                            { label: '體重 (kg)', key: 'weight' },
                            { label: '鞋號', key: 'shoeSize' },
                            { label: '喜歡的顏色', key: 'favColor' },
                            { label: '小嗜好', key: 'hobby' }
                        ].map(({ label, key }) => (
                            <div key={key} className="flex items-center justify-between border-b border-slate-50 pb-3">
                                <span className="text-slate-400 font-bold text-sm">{label}</span>
                                {isEditing ? (
                                    <input 
                                        value={tempData[key] || ''}
                                        onChange={e => setTempData({...tempData, [key]: e.target.value})}
                                        className="w-32 bg-slate-50 border-none rounded-xl px-3 py-1.5 text-right focus:ring-2 focus:ring-emerald-100 outline-none text-sm font-bold"
                                        placeholder="請填寫..."
                                    />
                                ) : (
                                    <span className="text-slate-700 font-black text-sm">{data?.[key] || '等待填寫...'}</span>
                                )}
                            </div>
                        ))}
                    </div>

                    {isEditing && (
                        <button onClick={handleSave} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all`}>
                            <Icon name="Save" size={18} /> 保存守護者檔案
                        </button>
                    )}
                </div>
            );
        };

        const LoveTree = ({ progress, isGrowing }) => {
            const ani = isGrowing ? "animate-bounce" : "";
            const renderTree = () => {
                if (progress === 0) return <div className={`text-amber-700 mt-10 flex flex-col items-center ${ani}`}><div className="w-5 h-5 bg-amber-800 rounded-full shadow-inner"></div><span className="text-[10px] mt-2 font-black opacity-40 uppercase tracking-widest">Seeds</span></div>;
                if (progress < 30) return <div className={`text-emerald-500 mt-6 flex flex-col items-center ${ani}`}><Icon name="TreePine" size={52} /><span className="block text-[10px] font-bold opacity-50 mt-1 uppercase text-center">Sprout</span></div>;
                if (progress < 60) return <div className={`text-emerald-600 scale-125 mt-4 flex flex-col items-center ${ani}`}><Icon name="TreePine" size={60} /><span className="block text-[10px] font-bold opacity-50 mt-1 uppercase text-center">Growing</span></div>;
                if (progress < 90) return <div className={`relative text-green-700 scale-150 mt-2 flex flex-col items-center ${ani}`}><Icon name="TreePine" size={68} /><Icon name="Flower2" className="absolute -top-1 -right-1 text-rose-300 animate-pulse" size={16} /></div>;
                return <div className={`relative text-green-800 scale-[1.8] flex flex-col items-center ${ani}`}><Icon name="TreePine" size={72} /><div className="absolute inset-0 flex items-center justify-center"><Icon name="Heart" className="text-rose-400/60 fill-current animate-ping" size={24} fill="currentColor" /></div></div>;
            };
            return (
                <div className="flex flex-col items-center justify-center py-14 bg-gradient-to-b from-emerald-50/20 to-emerald-100/30 rounded-[3.5rem] border border-emerald-100/50 mb-10 overflow-hidden relative shadow-inner">
                    <div className="absolute top-5 left-8 flex items-center gap-2 text-emerald-500/50"><Icon name="Wind" size={14} /><span className="text-[10px] font-black tracking-[0.2em] uppercase">Dream Forest</span></div>
                    {renderTree()}
                    <div className="mt-12 flex flex-col items-center gap-2">
                        <div className="px-6 py-2 bg-white/80 backdrop-blur-md rounded-full border border-emerald-200 shadow-sm flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div><p className="text-xs font-black text-emerald-800 tracking-tight">能量：{progress}%</p></div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [events, setEvents] = useState([]);
            const [profiles, setProfiles] = useState({ A: {}, B: {} });
            const [mySide, setMySide] = useState('A');
            const [newWish, setNewWish] = useState('');
            const [selectedCat, setSelectedCat] = useState('date');
            const [isGrowing, setIsGrowing] = useState(false);
            const [showEventForm, setShowEventForm] = useState(false);
            const [showProfiles, setShowProfiles] = useState(false);
            const [eventTitle, setEventTitle] = useState('');
            const [eventDate, setEventDate] = useState('');
            const [eventType, setEventType] = useState('anniversary');
            const guideRef = useRef(null);

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.fb) {
                        clearInterval(checkFB);
                        window.fb.signInAnonymously(window.fb.auth);
                        window.fb.onAuthStateChanged(window.fb.auth, setUser);
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot } = window.fb;
                const path = `artifacts/${appId}/public/data`;
                
                const unsubWishes = onSnapshot(collection(db, `${path}/wishes`), (snap) => {
                    setWishes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });
                const unsubEvents = onSnapshot(collection(db, `${path}/events`), (snap) => {
                    setEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => getDaysUntil(a.date) - getDaysUntil(b.date)));
                });
                const unsubProfiles = onSnapshot(collection(db, `${path}/profiles`), (snap) => {
                    const data = { A: {}, B: {} };
                    snap.docs.forEach(d => { data[d.id] = d.data(); });
                    setProfiles(data);
                });
                return () => { unsubWishes(); unsubEvents(); unsubProfiles(); };
            }, [user]);

            const saveProfile = async (side, data) => {
                if (!window.fb || !user) return;
                await window.fb.setDoc(window.fb.doc(window.fb.db, `artifacts/${appId}/public/data/profiles`, side), data);
            };

            const addWish = async (e) => {
                e.preventDefault();
                if (!newWish.trim() || !window.fb || !user) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, `artifacts/${appId}/public/data/wishes`), {
                    text: newWish, category: selectedCat, creatorSide: mySide, completed: false, createdAt: window.fb.serverTimestamp()
                });
                setNewWish('');
            };

            const addEvent = async (e) => {
                e.preventDefault();
                if (!eventTitle || !eventDate || !user) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, `artifacts/${appId}/public/data/events`), {
                    title: eventTitle, date: eventDate, type: eventType, createdAt: window.fb.serverTimestamp()
                });
                setEventTitle(''); setEventDate(''); setShowEventForm(false);
            };

            const toggleDone = async (item) => {
                const isNowDone = !item.completed;
                if (isNowDone) { setIsGrowing(true); setTimeout(() => setIsGrowing(false), 1500); }
                await window.fb.updateDoc(window.fb.doc(window.fb.db, `artifacts/${appId}/public/data/wishes`, item.id), { completed: isNowDone });
            };

            const deleteItem = async (col, id) => {
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, `artifacts/${appId}/public/data/${col}`, id));
            };

            const progress = wishes.length > 0 ? Math.round((wishes.filter(w => w.completed).length / wishes.length) * 100) : 0;

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-slate-600 pb-32 relative">
                    
                    {/* --- 全螢幕檔案視窗 --- */}
                    {showProfiles && (
                        <div className="fixed inset-0 z-[100] bg-white/60 backdrop-blur-2xl animate-in fade-in duration-300 overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12">
                                <div className="flex items-center justify-between mb-10">
                                    <button onClick={() => setShowProfiles(false)} className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-emerald-50 hover:text-emerald-500 transition-all active:scale-90">
                                        <Icon name="ChevronLeft" size={24} />
                                    </button>
                                    <div className="flex flex-col items-center">
                                        <h2 className="font-black text-xl text-slate-800 tracking-widest uppercase">森林守護者檔案</h2>
                                        <div className="w-8 h-1 bg-emerald-100 rounded-full mt-1"></div>
                                    </div>
                                    <div className="w-12 h-12"></div>
                                </div>
                                
                                <div className="space-y-8">
                                    <ProfileCard side="A" data={profiles.A} onSave={saveProfile} />
                                    <ProfileCard side="B" data={profiles.B} onSave={saveProfile} />
                                </div>

                                <p className="text-center text-[10px] font-bold text-slate-300 mt-10 uppercase tracking-[0.3em] flex items-center justify-center gap-2">
                                    <Icon name="ShieldHeart" size={12} className="text-emerald-100" />
                                    糖糖 & 果果 專屬記憶
                                    <Icon name="ShieldHeart" size={12} className="text-emerald-100" />
                                </p>
                            </div>
                        </div>
                    )}

                    {/* --- 主介面 Header --- */}
                    <header className="bg-white/70 backdrop-blur-xl sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-emerald-50">
                        <div className="flex items-center gap-3"><Icon name="Droplets" className="text-emerald-500 animate-pulse" size={24} /><h1 className="font-black text-lg text-emerald-800 leading-none">夢想森林</h1></div>
                        <div className="flex items-center gap-2">
                            {/* 更具守護感的入口圖示：愛心盾牌 */}
                            <button onClick={() => setShowProfiles(true)} className="group relative p-2.5 bg-emerald-50 rounded-2xl text-emerald-600 shadow-sm border border-emerald-100 hover:bg-emerald-400 hover:text-white hover:scale-110 transition-all active:scale-95 overflow-hidden">
                                <Icon name="ShieldHeart" size={22} className="group-hover:animate-bounce" />
                                <div className="absolute top-0 right-0 w-2 h-2 bg-rose-400 rounded-full border-2 border-white translate-x-1/3 -translate-y-1/3"></div>
                            </button>
                            <button onClick={() => guideRef.current?.scrollIntoView({behavior:'smooth'})} className="p-2 text-slate-300 hover:text-emerald-500 transition-all"><Icon name="HelpCircle" size={22} /></button>
                            <div className="flex bg-slate-100/50 p-1 rounded-2xl">
                                {Object.values(PARTNERS).map(p => (
                                    <button key={p.id} onClick={() => setMySide(p.id)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all ${mySide === p.id ? `${p.accent} text-white shadow-md` : 'text-slate-300'}`}>{p.displayName}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 mt-8">
                        <LoveTree progress={progress} isGrowing={isGrowing} />

                        {/* 星光預告 (重要日子) */}
                        <section className="mb-12">
                            <div className="flex justify-between items-center mb-5 px-1">
                                <div className="flex items-center gap-2 text-slate-400">
                                    <Icon name="Calendar" size={16} />
                                    <h3 className="text-xs font-black uppercase tracking-[0.2em]">星光預告</h3>
                                </div>
                                <button onClick={() => setShowEventForm(!showEventForm)} className="text-[10px] font-black bg-white border border-slate-100 px-4 py-2 rounded-full text-slate-400 hover:text-emerald-500 transition-all shadow-sm">
                                    {showEventForm ? '取消' : '+ 記下日子'}
                                </button>
                            </div>

                            {showEventForm && (
                                <form onSubmit={addEvent} className="bg-white p-7 rounded-[2.5rem] border border-emerald-50 shadow-2xl shadow-emerald-50/20 mb-8 space-y-5 animate-in slide-in-from-top-4">
                                    <input type="text" value={eventTitle} onChange={e => setEventTitle(e.target.value)} placeholder="日子名稱..." className="w-full bg-slate-50 p-4 rounded-2xl border-none text-sm outline-none focus:ring-2 focus:ring-emerald-100" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="relative">
                                            <input type="date" value={eventDate} onChange={e => setEventDate(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl border-none text-sm outline-none focus:ring-2 focus:ring-emerald-100 cursor-pointer" />
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300"><Icon name="Calendar" size={16} /></div>
                                        </div>
                                        <div className="relative">
                                            <select value={eventType} onChange={e => setEventType(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl border-none text-sm outline-none text-slate-500 font-medium appearance-none cursor-pointer">
                                                <option value="anniversary">紀念日</option>
                                                <option value="birthday">生日</option>
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300"><Icon name="ChevronDown" size={16} /></div>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-emerald-400 text-white rounded-2xl font-black text-sm shadow-xl hover:bg-emerald-500 transition-all">種下回憶種子</button>
                                </form>
                            )}

                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                                {events.map(event => (
                                    <div key={event.id} className="min-w-[150px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm relative group snap-start transition-all hover:shadow-md">
                                        <button onClick={() => deleteItem('events', event.id)} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-400 transition-all"><Icon name="Trash2" size={12} /></button>
                                        <div className="w-10 h-10 mb-4 rounded-2xl flex items-center justify-center bg-emerald-50 text-emerald-500">
                                            {event.type === 'birthday' ? <Icon name="Cake" size={18} /> : <Icon name="Sparkles" size={18} />}
                                        </div>
                                        <h4 className="text-[11px] font-bold text-slate-400 truncate mb-1">{event.title}</h4>
                                        <div className="flex items-baseline gap-1">
                                            <span className="text-2xl font-black text-slate-800">{getDaysUntil(event.date)}</span>
                                            <span className="text-[10px] text-slate-300 font-black uppercase">Days</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 投遞許願瓶區域 */}
                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-5 px-1 text-slate-400"><Icon name="Sparkles" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">投遞許願瓶</h3></div>
                            <div className={`bg-white rounded-[3rem] p-8 shadow-2xl border-2 transition-all duration-700 ${PARTNERS[mySide].border}`}>
                                <form onSubmit={addWish} className="space-y-6">
                                    <textarea value={newWish} onChange={e => setNewWish(e.target.value)} placeholder={`親愛的 ${PARTNERS[mySide].displayName}，想在那瓶子裡裝進什麼願望？`} className="w-full p-4 bg-transparent border-none outline-none h-24 placeholder:text-slate-300 text-lg font-medium resize-none" />
                                    <div className="flex flex-wrap gap-2">
                                        {CATEGORIES.map(cat => (
                                            <button key={cat.id} type="button" onClick={() => setSelectedCat(cat.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-[13px] font-bold transition-all ${selectedCat === cat.id ? `${PARTNERS[mySide].accent} text-white shadow-lg` : 'bg-slate-50 text-slate-400'}`}>
                                                <Icon name={cat.icon} size={14} /> {cat.label}
                                            </button>
                                        ))}
                                    </div>
                                    <button type="submit" disabled={!newWish.trim() || !user} className={`w-full py-5 ${PARTNERS[mySide].accent} text-white rounded-[2rem] font-black text-md shadow-xl active:scale-95 transition-all`}>封存願望 🍾</button>
                                </form>
                            </div>
                        </section>

                        {/* 願望列表 */}
                        <div className="space-y-8 mb-24">
                            {wishes.map((item) => {
                                const side = PARTNERS[item.creatorSide || 'A'];
                                const cat = CATEGORIES.find(c => c.id === item.category) || CATEGORIES[0];
                                return (
                                    <div key={item.id} className={`relative p-8 rounded-[3.5rem] border transition-all ${item.completed ? 'opacity-40 grayscale bg-slate-50' : `${side.bottle} ${side.border} shadow-lg shadow-emerald-50/20`}`}>
                                        <div className="flex justify-between items-start mb-5">
                                            <span className={`px-5 py-1.5 rounded-full ${item.completed ? 'bg-slate-200 text-slate-400' : `${side.accent} text-white`} text-[10px] font-black uppercase tracking-widest`}>{cat.label}</span>
                                            <button onClick={() => deleteItem('wishes', item.id)} className="text-slate-300 hover:text-rose-400 transition-colors"><Icon name="Trash2" size={16} /></button>
                                        </div>
                                        <p className={`text-slate-700 font-bold mb-10 text-lg ${item.completed ? 'line-through opacity-50' : ''}`}>{item.text}</p>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-black text-white shadow-md ${side.accent}`}>{side.displayName[0]}</div>
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{side.displayName}</span>
                                            </div>
                                            <button onClick={() => toggleDone(item)} className={`px-7 py-3 rounded-full text-[13px] font-black border transition-all ${item.completed ? 'bg-emerald-500 text-white' : 'bg-white text-slate-300 border-slate-100 hover:border-emerald-200'}`}>{item.completed ? '願望達成' : '灌溉願望'}</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* 守則 */}
                        <section ref={guideRef} className="mt-24 pt-16 border-t border-emerald-50 pb-20">
                            <div className="flex items-center gap-3 mb-8"><Icon name="BookOpen" className="text-emerald-400" size={24} /><h2 className="font-black text-slate-500 uppercase tracking-widest">森林使用守則</h2></div>
                            <div className="bg-white rounded-[3rem] p-10 shadow-sm border border-emerald-50 space-y-10 text-sm">
                                <div><h4 className="font-black text-emerald-700 mb-4 flex items-center gap-2"><Icon name="Sparkles" size={18}/> 🌟 核心理念</h4><p className="text-slate-500 pl-8 font-medium leading-relaxed font-sans">在這個空間裡，你們的願望會轉化成養分，讓小樹茁壯。點擊上方導航列的**盾牌圖示**，可以開啟你們的專屬守護者檔案，記錄那些值得被記住的身高體重等秘密！</p></div>
                            </div>
                        </section>
                    </main>

                    {/* 底部導航 */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50">
                        <div className="bg-white/90 backdrop-blur-2xl p-6 rounded-[2.5rem] shadow-2xl border border-emerald-100/50 flex items-center gap-6 ring-1 ring-emerald-50">
                            <div className="flex-1"><div className="flex justify-between items-center mb-2 px-1 text-[10px] font-black text-slate-400 uppercase tracking-widest"><span>森林能量</span><span>{progress}%</span></div><div className="h-3 bg-emerald-50 rounded-full overflow-hidden p-0.5 border"><div className="h-full bg-gradient-to-r from-emerald-300 to-green-500 rounded-full transition-all duration-1000 ease-out" style={{ width: `${progress}%` }} /></div></div>
                            <div className={`p-3 rounded-2xl shadow-lg ring-4 ring-white transition-all duration-500 ${isGrowing ? 'bg-emerald-400 scale-125' : 'bg-emerald-500'}`}><Icon name="Heart" size={20} className="text-white fill-current" fill="currentColor" /></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
