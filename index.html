<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖糖與果果的夢想森林 🌳</title>
    
    <!-- 引入工具庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAplUiEFdAdT0N6OSGWhKOeijpEF8oFlMk", 
            authDomain: "dream-forest-66323.firebaseapp.com",
            projectId: "dream-forest-66323",
            storageBucket: "dream-forest-66323.appspot.com",
            messagingSenderId: "138431071216",
            appId: "1:138431071216:web:0ed8b8dd15b9555198d335"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { db, auth, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, signInAnonymously, onAuthStateChanged, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFCF8; overflow-x: hidden; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input[type="date"] { position: relative; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background: transparent;
            color: transparent;
            cursor: pointer;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .landmine-shake:hover { animation: shake 0.5s both; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .tap-active:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const icons = {
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                ShieldHeart: <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="M12 14.5c.8-1 2.5-1.4 3-1 .6.4.5 1.5 0 2.2-1 1.3-3 2.8-3 2.8s-2-1.5-3-2.8c-.5-.7-.6-1.8 0-2.2.5-.4 2.2 0 3 1z" fill="currentColor" fillOpacity="0.3" /></React.Fragment>,
                Lock: <React.Fragment><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                Landmine: <React.Fragment><circle cx="12" cy="12" r="7" /><path d="M12 2v3M12 19v3M2 12h3M19 12h3" /><circle cx="12" cy="12" r="2" fill="currentColor"/></React.Fragment>,
                Plus: <path d="M5 12h14m-7-7v14" />,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />,
                CheckCircle2: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></React.Fragment>,
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                Calendar: <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="3" y1="10" x2="21" y2="10" /></React.Fragment>,
                Droplets: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                TreePine: <React.Fragment><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-2l3.3-3.7a1 1 0 0 1 1.4 0L12 13l2.3-2.7a1 1 0 0 1 1.4 0L19 14h-2Z" /><path d="M12 22v-3" /></React.Fragment>,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                Edit3: <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />,
                X: <React.Fragment><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></React.Fragment>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const appId = 'couple-dream-forest-v1';
        const PARTNERS = {
            A: { id: 'A', displayName: '糖糖', color: 'rose', accent: 'bg-rose-400', border: 'border-rose-200', text: 'text-rose-400', bg: 'bg-rose-50' },
            B: { id: 'B', displayName: '果果', color: 'sky', accent: 'bg-sky-400', border: 'border-sky-200', text: 'text-sky-400', bg: 'bg-sky-50' }
        };

        // --- 修正後的日期算法：計算從「那天」到「今天」已經過了多久 ---
        const getDaysElapsed = (dateStr) => {
            if (!dateStr) return 0;
            const pastDate = new Date(dateStr);
            pastDate.setHours(0, 0, 0, 0); 
            
            const today = new Date();
            today.setHours(0, 0, 0, 0); 

            const diffTime = today.getTime() - pastDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            return diffDays;
        };

        const formatFullDate = (dateStr) => {
            if (!dateStr) return "";
            return dateStr.replace(/-/g, " / ");
        };

        const LandmineSystem = ({ side, data, onSave, onDelete }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [tempData, setTempData] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTempData(data || {}); }, [data]);
            
            return (
                <div className={`w-full transition-all duration-500 ${isOpen ? 'mb-8' : 'mb-3'}`}>
                    <button onClick={() => setIsOpen(!isOpen)} className={`w-full flex items-center justify-between p-5 rounded-[2rem] border-2 transition-all tap-active ${isOpen ? `${config.border} bg-white shadow-lg` : 'bg-slate-50 border-transparent hover:bg-white'}`}>
                        <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all landmine-shake ${isOpen ? `${config.accent} text-white animate-bounce` : 'bg-rose-100 text-rose-400'}`}><Icon name="Landmine" size={20} fill={isOpen ? "currentColor" : "none"} /></div>
                            <span className={`font-black text-sm uppercase tracking-widest ${isOpen ? config.text : 'text-slate-400'}`}>{config.displayName} 爆炸預警</span>
                        </div>
                        <Icon name="ChevronDown" size={18} className={`text-slate-300 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {isOpen && (
                        <div className={`mt-3 bg-white p-6 rounded-[2.5rem] border-2 ${config.border} shadow-inner relative animate-in zoom-in-95 duration-200`}>
                            <div className="flex justify-between items-center mb-4 px-1">
                                <span className="text-[10px] font-black text-rose-300 tracking-widest flex items-center gap-2"><Icon name="Zap" size={10} className="animate-pulse" /> 內心數據讀取中</span>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => { if(confirm('確定要清空這條心聲嗎？')) onDelete(side); }} className="p-1.5 text-slate-300 hover:text-rose-400 transition-colors"><Icon name="Trash2" size={18} /></button>
                                    <button onClick={() => setIsEditing(!isEditing)} className="p-1.5 text-slate-300 hover:text-emerald-500 tap-active">{isEditing ? <Icon name="X" size={18} /> : <Icon name="Edit3" size={18} />}</button>
                                </div>
                            </div>
                            <div className={`rounded-3xl p-5 ${config.bg} border border-dashed ${config.border}`}>
                                {isEditing ? <textarea value={tempData.innerWorld || ''} onChange={e => setTempData({...tempData, innerWorld: e.target.value})} className="w-full h-32 bg-white/60 border-none rounded-2xl p-4 text-sm font-medium outline-none resize-none text-center" /> : 
                                <p className="text-slate-600 text-sm font-medium leading-relaxed italic whitespace-pre-wrap px-2 text-center">{data?.innerWorld || '目前森林天氣晴朗。'}</p>}
                            </div>
                            {isEditing && <button onClick={async () => { await onSave(side, tempData); setIsEditing(false); }} className={`w-full mt-4 py-3 ${config.accent} text-white rounded-2xl font-black text-xs active:scale-95 shadow-md`}>更新心情預警</button>}
                        </div>
                    )}
                </div>
            );
        };

        const ProfileInfoCard = ({ side, data, onSave, onDelete }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [tempData, setTempData] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTempData(data || {}); }, [data]);
            const fields = [{l:'海拔高度', k:'height'}, {l:'佔地總重', k:'weight'}, {l:'足跡長度', k:'shoeSize'}, {l:'林木色調', k:'favColor'}];
            
            return (
                <div className={`w-full bg-white rounded-[2.5rem] p-8 border-2 transition-all ${config.border} shadow-xl mb-6 relative overflow-hidden`}>
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-4">
                            <div className={`w-12 h-12 rounded-[1.2rem] ${config.accent} flex items-center justify-center text-white shadow-lg`}><Icon name="ShieldHeart" size={24} /></div>
                            <div><h3 className={`font-black text-xl ${config.text}`}>{config.displayName} 物理卷宗</h3></div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => { if(confirm('確定要清空這份卷宗嗎？')) onDelete(side); }} className="p-2 text-slate-300 hover:text-rose-400 transition-colors"><Icon name="Trash2" size={20} /></button>
                            <button onClick={() => setIsEditing(!isEditing)} className="p-2 text-slate-300 hover:text-emerald-500 tap-active">{isEditing ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-4 text-center">
                        {fields.map(f => (
                            <div key={f.k} className="flex flex-col border-b border-slate-50 pb-3">
                                <span className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-1">{f.l}</span>
                                {isEditing ? <input value={tempData[f.k] || ''} onChange={e => setTempData({...tempData, [f.k]: e.target.value})} className="w-full bg-slate-50 border-none rounded-xl px-3 py-1 text-center text-sm font-bold outline-none" /> : <span className="text-slate-700 font-black text-sm">{data?.[f.k] || '---'}</span>}
                            </div>
                        ))}
                    </div>
                    {isEditing && <button onClick={async () => { await onSave(side, tempData); setIsEditing(false); }} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm shadow-lg active:scale-95`}>存入雲端數據</button>}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [events, setEvents] = useState([]);
            const [profiles, setProfiles] = useState({ A: {}, B: {} });
            const [mySide, setMySide] = useState('A');
            const [newWish, setNewWish] = useState('');
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [errorCode, setErrorCode] = useState("");
            const [showProfiles, setShowProfiles] = useState(false);
            const [showEventForm, setShowEventForm] = useState(false);
            const [isGrowing, setIsGrowing] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    if (window.fb) {
                        try {
                            await window.fb.signInAnonymously(window.fb.auth);
                            window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                                if (u) { setUser(u); setLoading(false); }
                            });
                        } catch (e) { 
                            console.error(e); 
                            setErrorMsg("Firebase 驗證失敗。請檢查 API Key 是否正確。");
                            setErrorCode(e.code);
                        }
                    }
                };
                const checkInterval = setInterval(() => { if (window.fb) { clearInterval(checkInterval); initAuth(); } }, 500);
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (loading) {
                    const timer = setTimeout(() => {
                        if (loading && !errorMsg) {
                            setErrorMsg("連線超時：請確認資料庫規則(Rules)已改為 true 並點擊發布。");
                        }
                    }, 12000);
                    return () => clearTimeout(timer);
                }
            }, [loading, errorMsg]);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                
                const unsubW = onSnapshot(path('wishes'), snap => {
                    setWishes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => { console.error(err); setErrorMsg("權限不足：資料庫被鎖住了！"); setErrorCode(err.code); });
                
                const unsubE = onSnapshot(path('events'), snap => {
                    setEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });
                
                const unsubP = onSnapshot(path('profiles'), snap => {
                    const data = { A: {}, B: {} }; snap.docs.forEach(d => { data[d.id] = d.data(); }); setProfiles(data);
                });
                return () => { unsubW(); unsubE(); unsubP(); };
            }, [user]);

            const addWish = async (e) => {
                e.preventDefault();
                if (!newWish.trim() || !window.fb) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes'), {
                    text: newWish, creatorSide: mySide, completed: false, createdAt: window.fb.serverTimestamp()
                });
                setNewWish('');
            };

            const handleAddEvent = async (e) => {
                e.preventDefault();
                const title = e.target[0].value;
                const date = e.target[1].value;
                if (!title || !date || !window.fb) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'events'), {
                    title: title, date: date, createdAt: window.fb.serverTimestamp()
                });
                setShowEventForm(false);
            };

            const toggleDone = async (item) => {
                const next = !item.completed;
                if (next) { setIsGrowing(true); setTimeout(() => setIsGrowing(false), 1500); }
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes', item.id), { completed: next });
            };

            const deleteItem = async (col, id) => {
                await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', col, id));
            };

            const saveProfile = (s, d) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), d);
            
            const clearProfile = (s) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), {
                height: "", weight: "", shoeSize: "", favColor: "", innerWorld: ""
            });

            const clearInnerWorld = (s) => {
                const currentData = profiles[s] || {};
                window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), {
                    ...currentData, innerWorld: ""
                });
            };

            if (errorMsg) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center p-10 text-center text-rose-500">
                    <Icon name="Lock" size={48} className="mb-4" />
                    <h2 className="font-black text-xl mb-4 uppercase">連線失敗</h2>
                    <div className="bg-white p-6 rounded-3xl border-2 border-rose-100 text-sm mb-6 leading-relaxed">
                        {errorMsg}
                        {errorCode && <p className="mt-2 text-[10px] font-mono opacity-60">Code: {errorCode}</p>}
                    </div>
                    <button onClick={() => window.location.reload()} className="px-8 py-3 bg-rose-400 text-white rounded-full text-xs font-black shadow-lg">重新嘗試進入</button>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center text-emerald-400 text-center">
                    <Icon name="Sparkles" className="animate-spin mb-4" size={32} />
                    <span className="text-xs font-black tracking-[0.3em] uppercase">進入森林中...</span>
                </div>
            );

            const progress = wishes.length > 0 ? Math.round((wishes.filter(w => w.completed).length / wishes.length) * 100) : 0;

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-slate-600 pb-32 relative text-center">
                    {showProfiles && (
                        <div className="fixed inset-0 z-[100] bg-white/60 backdrop-blur-2xl animate-in fade-in duration-300 overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12">
                                <div className="flex items-center justify-between mb-10">
                                    <button onClick={() => setShowProfiles(false)} className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-emerald-50 transition-all tap-active"><Icon name="ChevronLeft" size={24} /></button>
                                    <h2 className="font-black text-xl text-slate-800 tracking-widest uppercase text-center">物理數據</h2><div className="w-12 h-12"></div>
                                </div>
                                <ProfileInfoCard side="A" data={profiles.A} onSave={saveProfile} onDelete={clearProfile} />
                                <ProfileInfoCard side="B" data={profiles.B} onSave={saveProfile} onDelete={clearProfile} />
                            </div>
                        </div>
                    )}

                    <header className="bg-white/70 backdrop-blur-xl sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-emerald-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-emerald-50 rounded-xl text-emerald-500 shadow-inner animate-pulse"><Icon name="Heart" size={20} /></div>
                            <h1 className="font-black text-lg text-emerald-800 leading-none">夢想森林</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setShowProfiles(true)} className="p-2.5 bg-emerald-50 rounded-2xl text-emerald-600 border border-emerald-100 active:scale-95 shadow-sm hover:bg-emerald-500 hover:text-white transition-all tap-active"><Icon name="ShieldHeart" size={22} /></button>
                            <div className="flex bg-slate-100/50 p-1 rounded-2xl border border-slate-100 shadow-inner">
                                {Object.values(PARTNERS).map(p => (
                                    <button key={p.id} onClick={() => setMySide(p.id)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all tap-active ${mySide === p.id ? `${p.accent} text-white shadow-md` : 'text-slate-300'}`}>{p.displayName}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 mt-8">
                        {/* 這裡加入小樹組件... */}
                        <div className="flex flex-col items-center justify-center py-10 bg-emerald-50/20 rounded-[3rem] border border-emerald-100/50 mb-10 shadow-inner">
                             <Icon name="TreePine" className="text-emerald-600" size={64} />
                             <div className="mt-8 px-6 py-2 bg-white/60 rounded-full border border-emerald-100 shadow-sm"><p className="text-xs font-black text-emerald-700">能量進度：{progress}%</p></div>
                        </div>

                        {/* 星光預告 */}
                        <section className="mb-12">
                            <div className="flex justify-between items-center mb-5 px-1">
                                <div className="flex items-center gap-2 text-slate-400"><Icon name="Calendar" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">星光預告</h3></div>
                                <button onClick={() => setShowEventForm(!showEventForm)} className="text-xs font-black bg-white border border-slate-200 px-5 py-2.5 rounded-full text-slate-400 hover:text-emerald-500 transition-all shadow-sm tap-active">{showEventForm ? '取消' : '+ 記下日子'}</button>
                            </div>
                            {showEventForm && (
                                <form onSubmit={handleAddEvent} className="bg-white p-7 rounded-[2.5rem] border border-emerald-50 shadow-2xl mb-8 space-y-5 animate-in slide-in-from-top-4 relative z-20">
                                    <input placeholder="日子的名稱..." className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner" required />
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm shadow-inner" required />
                                    <button type="submit" className="w-full py-4 bg-emerald-400 text-white rounded-2xl font-black text-sm shadow-xl tap-active">記錄這一天</button>
                                </form>
                            )}
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x min-h-[120px]">
                                {events.map(event => {
                                    const days = getDaysElapsed(event.date);
                                    return (
                                        <div key={event.id} className="min-w-[170px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md relative">
                                            <button onClick={() => deleteItem('events', event.id)} className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-400 transition-opacity p-1"><Icon name="Trash2" size={14}/></button>
                                            <div className="w-10 h-10 mb-4 rounded-2xl mx-auto flex items-center justify-center bg-emerald-50 text-emerald-500 shadow-inner">📆</div>
                                            <h4 className="text-[11px] font-bold text-slate-400 truncate mb-1 px-2">{event.title}</h4>
                                            <p className="text-[9px] font-black text-slate-300 mb-2">{formatFullDate(event.date)}</p>
                                            <p className="text-2xl font-black text-slate-800 tracking-tighter">{days.toLocaleString()}<span className="text-[10px] ml-1 uppercase opacity-30 font-black">Days</span></p>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-4 px-1 text-slate-400 justify-center"><Icon name="Plus" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">投遞許願瓶</h3></div>
                            <div className={`bg-white rounded-[3rem] p-8 shadow-2xl border-2 transition-all duration-700 ${PARTNERS[mySide].border}`}>
                                <form onSubmit={addWish} className="space-y-6 text-center">
                                    <textarea value={newWish} onChange={e=>setNewWish(e.target.value)} placeholder={`想在那瓶子裡裝進什麼願望？`} className="w-full p-4 bg-transparent border-none outline-none h-24 text-lg font-medium resize-none placeholder:text-slate-300 text-center" />
                                    <button type="submit" disabled={!newWish.trim()} className={`w-full py-5 ${PARTNERS[mySide].accent} text-white rounded-[2rem] font-black text-md shadow-xl tap-active`}>拋向森林 🍾</button>
                                </form>
                            </div>
                        </section>

                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-5 px-1 text-slate-400 justify-center"><Icon name="Lock" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">森林絕密：爆炸預警</h3></div>
                            <LandmineSystem side="A" data={profiles.A} onSave={saveProfile} onDelete={clearInnerWorld} />
                            <LandmineSystem side="B" data={profiles.B} onSave={saveProfile} onDelete={clearInnerWorld} />
                        </section>

                        <div className="space-y-8 mb-24 min-h-[100px]">
                            {wishes.map((item) => {
                                const side = PARTNERS[item.creatorSide || 'A'];
                                return (
                                    <div key={item.id} className={`relative p-8 rounded-[3.5rem] border transition-all ${item.completed ? 'opacity-40 grayscale bg-slate-50 border-slate-100 shadow-none' : `bg-white ${side.border} shadow-lg shadow-emerald-50/20`}`}>
                                        <div className="flex justify-between items-start mb-5">
                                            <span className={`px-4 py-1 rounded-full ${item.completed ? 'bg-slate-200 text-slate-400' : `${side.accent} text-white`} text-[10px] font-black uppercase tracking-widest`}>願望瓶</span>
                                            <button onClick={() => deleteItem('wishes', item.id)} className="text-slate-300 hover:text-rose-400 p-1 transition-colors"><Icon name="Trash2" size={16} /></button>
                                        </div>
                                        <p className={`text-slate-700 font-semibold mb-8 leading-relaxed text-md ${item.completed ? 'line-through text-slate-300' : ''}`}>{item.text}</p>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2 text-left">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black text-white shadow-md ${side.accent}`}>{side.displayName[0]}</div>
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{side.displayName}</span>
                                            </div>
                                            <button onClick={() => toggleDone(item)} className={`px-7 py-3 rounded-full text-[13px] font-black border transition-all tap-active ${item.completed ? 'bg-emerald-500 text-white border-transparent shadow-none' : 'bg-white text-slate-300 border-slate-100 hover:border-emerald-200'}`}>{item.completed ? '願望達成' : '灌溉願望'}</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50 text-left">
                        <div className="bg-white/90 backdrop-blur-2xl p-6 rounded-[2.5rem] shadow-2xl border border-emerald-100/50 flex items-center gap-6 ring-1 ring-emerald-50/50">
                            <div className="flex-1">
                                <div className="flex justify-between items-center mb-2 px-1 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <span>森林能量</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="h-3 bg-emerald-50 rounded-full overflow-hidden p-0.5 border shadow-inner">
                                    <div className="h-full bg-gradient-to-r from-emerald-300 to-green-500 rounded-full transition-all duration-1000 ease-out shadow-sm" style={{ width: `${progress}%` }} />
                                </div>
                            </div>
                            <div className={`p-3 rounded-2xl shadow-lg ring-4 ring-white transition-all duration-500 ${isGrowing ? 'bg-emerald-400 scale-125' : 'bg-emerald-500'} text-white shadow-emerald-100`}>
                                <Icon name="Heart" size={20} fill="currentColor" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
