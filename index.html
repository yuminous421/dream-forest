<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖糖與果果的夢想森林 🌳</title>
    
    <!-- 引入工具庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Firebase SDK (CDN 版本) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================================
        // 🚨 根據您的截圖，這是正確的 Firebase 配置
        // ==========================================================
        const firebaseConfig = {
              apiKey: "AIzaSyAplUiEFdAdT0N6OSGWhKOeijpEF8oFlMk",
  authDomain: "dream-forest-66323.firebaseapp.com",
  projectId: "dream-forest-66323",
  storageBucket: "dream-forest-66323.firebasestorage.app",
  messagingSenderId: "138431071216",
  appId: "1:138431071216:web:0ed8b8dd15b9555198d335",
  measurementId: "G-4BNB10W9TE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { db, auth, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, signInAnonymously, onAuthStateChanged, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFCF8; overflow-x: hidden; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input[type="date"]::-webkit-calendar-picker-indicator { background: transparent; cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .landmine-shake:hover { animation: shake 0.5s both; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 修正後的圖示系統 ---
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const icons = {
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                ShieldHeart: <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="M12 14.5c.8-1 2.5-1.4 3-1 .6.4.5 1.5 0 2.2-1 1.3-3 2.8-3 2.8s-2-1.5-3-2.8c-.5-.7-.6-1.8 0-2.2.5-.4 2.2 0 3 1z" fill="currentColor" fillOpacity="0.3" /></React.Fragment>,
                Lock: <React.Fragment><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                Landmine: <React.Fragment><circle cx="12" cy="12" r="7" /><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M5 19l2-2M17 5l2 2" /><circle cx="12" cy="12" r="2" fill="currentColor"/></React.Fragment>,
                Plus: <path d="M5 12h14m-7-7v14" />,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />,
                CheckCircle2: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></React.Fragment>,
                MapPin: <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></React.Fragment>,
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                Calendar: <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="3" y1="10" x2="21" y2="10" /></React.Fragment>,
                Droplets: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                TreePine: <React.Fragment><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-2l3.3-3.7a1 1 0 0 1 1.4 0L12 13l2.3-2.7a1 1 0 0 1 1.4 0L19 14h-2Z" /><path d="M12 22v-3" /></React.Fragment>,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                Edit3: <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />,
                Save: <React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /></React.Fragment>,
                X: <React.Fragment><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></React.Fragment>,
                Quote: <path d="M3 21c3 0 7-1 7-8V5H3v16zm11 0c3 0 7-1 7-8V5h-7v16z" />,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
                Stars: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const appId = 'couple-dream-forest-v1';
        const PARTNERS = {
            A: { id: 'A', displayName: '糖糖', color: 'rose', accent: 'bg-rose-400', border: 'border-rose-200', text: 'text-rose-400', bg: 'bg-rose-50' },
            B: { id: 'B', displayName: '果果', color: 'sky', accent: 'bg-sky-400', border: 'border-sky-200', text: 'text-sky-400', bg: 'bg-sky-50' }
        };

        const getDaysUntil = (dateStr) => {
            if (!dateStr) return 0;
            const now = new Date(); const date = new Date(dateStr); date.setFullYear(now.getFullYear());
            if (date < now) date.setFullYear(now.getFullYear() + 1);
            return Math.ceil(Math.abs(date - now) / (1000 * 60 * 60 * 24));
        };

        // --- 物理數據組件 ---
        const ProfileInfoCard = ({ side, data, onSave }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [tempData, setTempData] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTempData(data || {}); }, [data]);
            const fields = [{l:'海拔高度', k:'height'}, {l:'森林佔地重', k:'weight'}, {l:'腳掌面積', k:'shoeSize'}, {l:'視覺偏好', k:'favColor'}];
            return (
                <div className={`w-full bg-white rounded-[2.5rem] p-8 border-2 transition-all ${config.border} shadow-xl mb-6 relative overflow-hidden`}>
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-4">
                            <div className={`w-12 h-12 rounded-[1.2rem] ${config.accent} flex items-center justify-center text-white shadow-lg`}><Icon name="ShieldHeart" size={24} /></div>
                            <div><h3 className={`font-black text-xl ${config.text}`}>{config.displayName} 物理卷宗</h3></div>
                        </div>
                        <button onClick={() => setIsEditing(!isEditing)} className="p-2 text-slate-300 hover:text-emerald-500">{isEditing ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                        {fields.map(f => (
                            <div key={f.k} className="flex items-center justify-between border-b border-slate-50 pb-3">
                                <span className="text-slate-400 font-bold text-xs">{f.l}</span>
                                {isEditing ? <input value={tempData[f.k] || ''} onChange={e => setTempData({...tempData, [f.k]: e.target.value})} className="w-32 bg-slate-50 border-none rounded-xl px-3 py-1 text-right text-sm font-bold outline-none" /> : <span className="text-slate-700 font-black text-sm">{data?.[f.k] || '待填'}</span>}
                            </div>
                        ))}
                    </div>
                    {isEditing && <button onClick={async () => { await onSave(side, tempData); setIsEditing(false); }} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm`}>存入雲端檔案</button>}
                </div>
            );
        };

        // --- 地雷系統組件 ---
        const LandmineSystem = ({ side, data, onSave }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [tempData, setTempData] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTempData(data || {}); }, [data]);
            return (
                <div className={`w-full transition-all duration-500 ${isOpen ? 'mb-8' : 'mb-3'}`}>
                    <button onClick={() => setIsOpen(!isOpen)} className={`w-full flex items-center justify-between p-5 rounded-[2rem] border-2 transition-all ${isOpen ? `${config.border} bg-white shadow-lg` : 'bg-slate-50 border-transparent hover:bg-white'}`}>
                        <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all landmine-shake ${isOpen ? `${config.accent} text-white animate-bounce` : 'bg-rose-100 text-rose-400'}`}><Icon name="Landmine" size={20} fill={isOpen ? "currentColor" : "none"} /></div>
                            <span className={`font-black text-sm uppercase tracking-widest ${isOpen ? config.text : 'text-slate-400'}`}>{config.displayName} 爆炸預警</span>
                        </div>
                        <Icon name="ChevronDown" size={18} className={`text-slate-300 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {isOpen && (
                        <div className={`mt-3 bg-white p-6 rounded-[2.5rem] border-2 ${config.border} shadow-inner relative animate-in zoom-in-95 duration-200`}>
                            <div className="flex justify-between items-center mb-4 px-1">
                                <span className="text-[10px] font-black text-rose-300 tracking-widest flex items-center gap-2"><Icon name="Zap" size={10} className="animate-pulse" /> 內心數據讀取中</span>
                                <button onClick={() => setIsEditing(!isEditing)} className="p-1.5 text-slate-300 hover:text-emerald-500">{isEditing ? <Icon name="X" size={18} /> : <Icon name="Edit3" size={18} />}</button>
                            </div>
                            <div className={`rounded-3xl p-5 ${config.bg} border border-dashed ${config.border}`}>
                                {isEditing ? <textarea value={tempData.innerWorld || ''} onChange={e => setTempData({...tempData, innerWorld: e.target.value})} className="w-full h-32 bg-white/60 border-none rounded-2xl p-4 text-sm font-medium outline-none resize-none" /> : 
                                <p className="text-slate-600 text-sm font-medium leading-relaxed italic whitespace-pre-wrap px-2">{data?.innerWorld || '目前森林天氣晴朗。'}</p>}
                            </div>
                            {isEditing && <button onClick={async () => { await onSave(side, tempData); setIsEditing(false); }} className={`w-full mt-4 py-3 ${config.accent} text-white rounded-2xl font-black text-xs active:scale-95 shadow-md`}>更新雷達數據</button>}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [events, setEvents] = useState([]);
            const [profiles, setProfiles] = useState({ A: {}, B: {} });
            const [mySide, setMySide] = useState('A');
            const [newWish, setNewWish] = useState('');
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [errorCode, setErrorCode] = useState("");
            const [showProfiles, setShowProfiles] = useState(false);
            const [isGrowing, setIsGrowing] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    if (window.fb) {
                        try {
                            await window.fb.signInAnonymously(window.fb.auth);
                            window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                                if (u) { setUser(u); setLoading(false); }
                            });
                        } catch (e) { 
                            console.error(e); 
                            setErrorMsg("Firebase 驗證失敗。請檢查 API Key 是否正確。");
                            setErrorCode(e.code);
                        }
                    }
                };
                const timer = setInterval(() => { if (window.fb) { clearInterval(timer); initAuth(); } }, 500);
                setTimeout(() => { if (loading && !errorMsg) setErrorMsg("連線超時：請確認資料庫權限或 API Key。"); }, 6000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                onSnapshot(path('wishes'), snap => { setWishes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0))); }, (err) => { console.error(err); setErrorMsg("權限不足：資料庫被鎖住了！"); });
                onSnapshot(path('events'), snap => { setEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => getDaysUntil(a.date) - getDaysUntil(b.date))); });
                onSnapshot(path('profiles'), snap => { const data = { A: {}, B: {} }; snap.docs.forEach(d => { data[d.id] = d.data(); }); setProfiles(data); });
            }, [user]);

            const toggleDone = async (item) => {
                const next = !item.completed; if(next) { setIsGrowing(true); setTimeout(() => setIsGrowing(false), 1500); }
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes', item.id), { completed: next });
            };
            const saveProfile = (s, d) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), d);

            if (errorMsg) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center p-10 text-center text-rose-500">
                    <Icon name="Lock" size={48} className="mb-4" />
                    <h2 className="font-black text-xl mb-4 uppercase">驗證失敗</h2>
                    <div className="bg-white p-6 rounded-3xl border-2 border-rose-100 text-sm mb-6 leading-relaxed">
                        {errorMsg}
                        {errorCode && <p className="mt-2 text-[10px] font-mono opacity-60">Code: {errorCode}</p>}
                    </div>
                    <button onClick={() => window.location.reload()} className="px-8 py-3 bg-rose-400 text-white rounded-full text-xs font-black shadow-lg">重新嘗試進入</button>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center text-emerald-400">
                    <Icon name="Sparkles" className="animate-spin mb-4" size={32} />
                    <span className="text-xs font-black tracking-[0.3em] uppercase">進入森林中...</span>
                </div>
            );

            const progress = wishes.length > 0 ? Math.round((wishes.filter(w => w.completed).length / wishes.length) * 100) : 0;

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-slate-600 pb-32 relative">
                    {showProfiles && (
                        <div className="fixed inset-0 z-[100] bg-white/60 backdrop-blur-2xl animate-in fade-in duration-300 overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12">
                                <div className="flex items-center justify-between mb-10">
                                    <button onClick={() => setShowProfiles(false)} className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-emerald-50 transition-all"><Icon name="ChevronLeft" size={24} /></button>
                                    <h2 className="font-black text-xl text-slate-800 tracking-widest uppercase text-center">物理數據</h2><div className="w-12 h-12"></div>
                                </div>
                                <ProfileInfoCard side="A" data={profiles.A} onSave={saveProfile} />
                                <ProfileInfoCard side="B" data={profiles.B} onSave={saveProfile} />
                            </div>
                        </div>
                    )}

                    <header className="bg-white/70 backdrop-blur-xl sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-emerald-50 shadow-sm">
                        <div className="flex items-center gap-3"><Icon name="Droplets" className="text-emerald-500 animate-pulse" size={24} /><h1 className="font-black text-lg text-emerald-800">夢想森林</h1></div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setShowProfiles(true)} className="p-2.5 bg-emerald-50 rounded-2xl text-emerald-600 border border-emerald-100 active:scale-95 shadow-sm hover:bg-emerald-500 hover:text-white transition-all"><Icon name="ShieldHeart" size={22} /></button>
                            <div className="flex bg-slate-100/50 p-1 rounded-2xl border border-slate-100">
                                {Object.values(PARTNERS).map(p => (
                                    <button key={p.id} onClick={() => setMySide(p.id)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all ${mySide === p.id ? `${p.accent} text-white shadow-md` : 'text-slate-300'}`}>{p.displayName}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 mt-8">
                        {/* 成長樹 */}
                        <div className="flex flex-col items-center justify-center py-14 bg-gradient-to-b from-emerald-50/20 to-emerald-100/30 rounded-[3.5rem] border border-emerald-100/50 mb-10 shadow-inner">
                            <Icon name="TreePine" className={`text-emerald-600 transition-all ${progress > 50 ? 'scale-150' : 'scale-100'}`} size={64} />
                            <div className="mt-12 px-6 py-2 bg-white/80 rounded-full border border-emerald-200 text-xs font-black text-emerald-800 tracking-tight">能量進度：{progress}%</div>
                        </div>

                        <section className="mb-12">
                            <div className="flex justify-between items-center mb-5 px-1"><div className="flex items-center gap-2 text-slate-400"><Icon name="Calendar" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">星光預告</h3></div></div>
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                                {events.map(event => (
                                    <div key={event.id} className="min-w-[150px] bg-white p-5 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md">
                                        <div className="w-10 h-10 mb-4 rounded-2xl mx-auto flex items-center justify-center bg-emerald-50 text-emerald-500 shadow-inner">📆</div>
                                        <h4 className="text-[11px] font-bold text-slate-400 truncate mb-1 text-center">{event.title}</h4>
                                        <p className="text-xl font-black text-slate-800 text-center">{getDaysUntil(event.date)}<span className="text-[10px] ml-1 uppercase opacity-30 font-black">Days</span></p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-4 px-1 text-slate-400"><Icon name="Plus" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">投遞許願瓶</h3></div>
                            <div className={`bg-white rounded-[3rem] p-8 shadow-2xl border-2 transition-all duration-700 ${PARTNERS[mySide].border}`}>
                                <form onSubmit={async (e) => { e.preventDefault(); if(!newWish.trim())return; await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes'), { text: newWish, creatorSide: mySide, completed: false, createdAt: window.fb.serverTimestamp() }); setNewWish(''); }} className="space-y-6">
                                    <textarea value={newWish} onChange={e=>setNewWish(e.target.value)} placeholder={`想在那瓶子裡裝進什麼願望？`} className="w-full p-4 bg-transparent border-none outline-none h-24 text-lg font-medium resize-none placeholder:text-slate-300" />
                                    <button type="submit" disabled={!newWish.trim()} className={`w-full py-5 ${PARTNERS[mySide].accent} text-white rounded-[2rem] font-black text-md shadow-xl active:scale-95 transition-all`}>拋向森林 🍾</button>
                                </form>
                            </div>
                        </section>

                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-5 px-1 text-slate-400"><Icon name="Lock" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">森林絕密：爆炸預警</h3></div>
                            <LandmineSystem side="A" data={profiles.A} onSave={saveProfile} />
                            <LandmineSystem side="B" data={profiles.B} onSave={saveProfile} />
                        </section>

                        <div className="space-y-8 mb-24">
                            {wishes.map((item) => {
                                const side = PARTNERS[item.creatorSide || 'A'];
                                return (
                                    <div key={item.id} className={`relative p-8 rounded-[3.5rem] border transition-all ${item.completed ? 'opacity-40 grayscale bg-slate-50 border-slate-100' : `bg-white ${side.border} shadow-lg shadow-emerald-50/20`}`}>
                                        <p className={`text-slate-700 font-semibold mb-8 leading-relaxed text-md ${item.completed ? 'line-through text-slate-300' : ''}`}>{item.text}</p>
                                        <div className="flex items-center justify-between">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{side.displayName}</span>
                                            <button onClick={() => toggleDone(item)} className={`px-7 py-3 rounded-full text-[13px] font-black border transition-all ${item.completed ? 'bg-emerald-500 text-white border-transparent shadow-inner' : 'bg-white text-slate-300 border-slate-100 hover:border-emerald-200'}`}>{item.completed ? '願望達成' : '灌溉願望'}</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50">
                        <div className="bg-white/90 backdrop-blur-2xl p-6 rounded-[2.5rem] shadow-2xl border border-emerald-100/50 flex items-center gap-6 ring-1 ring-emerald-50">
                            <div className="flex-1">
                                <div className="flex justify-between items-center mb-2 px-1 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <span>森林能量</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="h-3 bg-emerald-50 rounded-full overflow-hidden p-0.5 border shadow-inner">
                                    <div className="h-full bg-gradient-to-r from-emerald-300 to-green-500 rounded-full transition-all duration-1000 ease-out shadow-sm" style={{ width: `${progress}%` }} />
                                </div>
                            </div>
                            <div className={`p-3 rounded-2xl shadow-lg ring-4 ring-white transition-all duration-500 ${isGrowing ? 'bg-emerald-400 scale-125' : 'bg-emerald-500'} text-white`}>
                                <Icon name="Heart" size={20} fill="currentColor" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
