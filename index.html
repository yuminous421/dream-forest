<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖糖與果果的夢想森林 🌳</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase 配置 (專屬糖糖與果果)
        const firebaseConfig = {
            apiKey: "AIzaSyAplUiEFdAdT0N6OSGWhKOeijpEF8oFlMk", 
            authDomain: "dream-forest-66323.firebaseapp.com",
            projectId: "dream-forest-66323",
            storageBucket: "dream-forest-66323.appspot.com",
            messagingSenderId: "138431071216",
            appId: "1:138431071216:web:0ed8b8dd15b9555198d335"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { db, auth, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, serverTimestamp, signInAnonymously, onAuthStateChanged, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFCF8; overflow-x: hidden; }
        
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 手機日期選擇器熱區強化 */
        input[type="date"] { position: relative; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%; background: transparent; color: transparent; cursor: pointer;
        }

        /* 地雷震動等級動畫 */
        .mine-level-1 { animation: shake 0.8s infinite ease-in-out; }
        .mine-level-2 { animation: shake 0.3s infinite linear; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        .mine-level-3 { animation: shake 0.1s infinite linear; box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-3px) rotate(-1deg); }
            75% { transform: translateX(3px) rotate(1deg); }
        }

        .kaboom-pulse { animation: kaboom 1.5s infinite; }
        @keyframes kaboom {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.4) drop-shadow(0 0 10px red); }
        }

        .reminder-glow { animation: reminder-blink 1.5s infinite; border-color: #fb7185 !important; }
        @keyframes reminder-blink {
            0%, 100% { box-shadow: 0 0 5px #fb7185; background-color: #fff; }
            50% { box-shadow: 0 0 20px #fb7185; background-color: #fff1f2; }
        }

        .tap-active:active { transform: scale(0.95); transition: transform 0.1s; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 全局圖示系統 ---
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const icons = {
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                ShieldHeart: <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /><path d="M12 14.5c.8-1 2.5-1.4 3-1 .6.4.5 1.5 0 2.2-1 1.3-3 2.8-3 2.8s-2-1.5-3-2.8c-.5-.7-.6-1.8 0-2.2.5-.4 2.2 0 3 1z" fill="currentColor" fillOpacity="0.3" /></React.Fragment>,
                Lock: <React.Fragment><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                Landmine: <React.Fragment><circle cx="12" cy="12" r="7" /><path d="M12 2v3M12 19v3M2 12h3M19 12h3" /><circle cx="12" cy="12" r="2" fill="currentColor"/></React.Fragment>,
                Plus: <path d="M5 12h14m-7-7v14" />,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />,
                CheckCircle2: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></React.Fragment>,
                Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                Calendar: <React.Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="3" y1="10" x2="21" y2="10" /></React.Fragment>,
                TreePine: <React.Fragment><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-2l3.3-3.7a1 1 0 0 1 1.4 0L12 13l2.3-2.7a1 1 0 0 1 1.4 0L19 14h-2Z" /><path d="M12 22v-3" /></React.Fragment>,
                X: <React.Fragment><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></React.Fragment>,
                Bomb: <React.Fragment><path d="M18 6L21 3M19 9L23 9M16 5L16 1" /><circle cx="9" cy="15" r="8" /></React.Fragment>,
                Flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5Z" />,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
                ChevronDown: <polyline points="6 9 12 15 18 9" />,
                ChevronLeft: <polyline points="15 18 9 12 15 6" />,
                Edit3: <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />,
                Bell: <React.Fragment><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></React.Fragment>,
                MapPin: <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></React.Fragment>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" />,
                Droplets: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const appId = 'couple-dream-forest-v1';
        const PARTNERS = {
            A: { id: 'A', displayName: '糖糖', accent: 'bg-rose-400', border: 'border-rose-200', text: 'text-rose-400', bg: 'bg-rose-50', shadow: 'shadow-rose-100' },
            B: { id: 'B', displayName: '果果', accent: 'bg-sky-400', border: 'border-sky-200', text: 'text-sky-400', bg: 'bg-sky-50', shadow: 'shadow-sky-100' }
        };

        const getDateStatus = (dateStr) => {
            if (!dateStr) return { diff: 0, type: 'past' };
            const target = new Date(dateStr); target.setHours(0,0,0,0);
            const now = new Date(); now.setHours(0,0,0,0);
            const diffTime = target.getTime() - now.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays > 0) return { diff: diffDays, type: 'future' };
            return { diff: Math.abs(diffDays), type: 'past' };
        };

        const formatFullDate = (d) => d ? d.replace(/-/g, " . ") : "";

        // --- 組件：物理卷宗 ---
        const ProfileCard = ({ side, data, onSave, onDelete }) => {
            const [isEdit, setIsEdit] = useState(false);
            const [tmp, setTmp] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTmp(data || {}); }, [data]);
            const fields = [{l:'海拔高度', k:'height'}, {l:'佔地總重', k:'weight'}, {l:'足跡印記', k:'shoeSize'}, {l:'林木色調', k:'favColor'}];
            return (
                <div className={`w-full bg-white rounded-[2.5rem] p-8 border-2 ${config.border} shadow-xl mb-6 relative overflow-hidden`}>
                    <div className="flex justify-between items-center mb-6 px-2">
                        <div className="flex items-center gap-4 text-left">
                            <div className={`w-12 h-12 rounded-[1.2rem] ${config.accent} flex items-center justify-center text-white shadow-lg`}><Icon name="ShieldHeart" size={24} /></div>
                            <h3 className={`font-black text-xl ${config.text}`}>{config.displayName} 卷宗</h3>
                        </div>
                        <div className="flex gap-1">
                            <button onClick={() => { if(confirm('要清空卷宗數據嗎？')) onDelete(side); }} className="p-2 text-slate-200 hover:text-rose-400 transition-colors"><Icon name="Trash2" size={18}/></button>
                            <button onClick={() => setIsEdit(!isEdit)} className="p-2 text-slate-300 hover:text-emerald-500 tap-active transition-all">{isEdit ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-4 text-center">
                        {fields.map(f => (
                            <div key={f.k} className="flex flex-col border-b border-slate-50 pb-3">
                                <span className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-1">{f.l}</span>
                                {isEdit ? <input value={tmp[f.k] || ''} onChange={e => setTmp({...tmp, [f.k]: e.target.value})} className="bg-slate-50 border-none rounded-xl px-3 py-1 text-center text-sm font-bold outline-none" /> : <span className="text-slate-700 font-black text-sm">{data?.[f.k] || '---'}</span>}
                            </div>
                        ))}
                    </div>
                    {isEdit && <button onClick={async () => { await onSave(side, tmp); setIsEdit(false); }} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm active:scale-95 shadow-lg`}>存入雲端備案</button>}
                </div>
            );
        };

        // --- 組件：地雷分級系統 ---
        const LandmineSystem = ({ side, data, onSave, onDelete }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isEdit, setIsEdit] = useState(false);
            const [tmp, setTmp] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTmp(data || {}); }, [data]);
            const mines = useMemo(() => data?.innerWorld?.split('\n').filter(l => l.trim() !== '') || [], [data]);
            const count = mines.length;
            const level = count === 0 ? 0 : count <= 2 ? 1 : count <= 5 ? 2 : 3;
            const renderIcon = () => {
                if (level === 0) return <Icon name="Landmine" size={22} />;
                if (level === 1) return <Icon name="Landmine" className="text-yellow-400 mine-level-1" size={24} fill="currentColor" />;
                if (level === 2) return <Icon name="Bomb" className="text-orange-500 mine-level-2" size={26} fill="currentColor" />;
                return <Icon name="Flame" className="text-rose-600 mine-level-3 kaboom-pulse" size={30} fill="currentColor" />;
            };
            return (
                <div className={`w-full transition-all duration-500 ${isOpen ? 'mb-10' : 'mb-3'}`}>
                    <button onClick={() => setIsOpen(!isOpen)} className={`w-full flex items-center justify-between p-6 rounded-[2.5rem] border-2 tap-active ${isOpen ? `${config.border} bg-white shadow-xl` : 'bg-slate-50 border-transparent hover:bg-white shadow-sm'}`}>
                        <div className="flex items-center gap-4">
                            <div className={`w-14 h-14 rounded-full flex items-center justify-center transition-all ${isOpen ? `${config.accent} text-white` : 'bg-white text-slate-400 shadow-inner'}`}>{renderIcon()}</div>
                            <div className="text-left"><span className={`block font-black text-sm uppercase tracking-widest ${isOpen ? config.text : 'text-slate-400'}`}>{config.displayName} 爆炸預警</span>{level > 0 && <span className="text-[10px] font-black text-rose-400 animate-pulse uppercase">偵測到 {count} 項情緒地雷</span>}</div>
                        </div>
                        <Icon name="ChevronDown" size={18} className={`text-slate-300 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {isOpen && (
                        <div className={`mt-4 bg-white p-8 rounded-[3rem] border-2 ${config.border} shadow-2xl relative animate-in zoom-in-95`}>
                            <div className="flex justify-between items-center mb-6 px-1">
                                <span className="text-[10px] font-black text-rose-400 tracking-widest flex items-center gap-2"><Icon name="Zap" size={12} className="animate-bounce" /> 批次心聲讀取中</span>
                                <div className="flex gap-2">
                                    <button onClick={() => { if(confirm('確定要引爆並清空所有地雷嗎？')) onDelete(side); }} className="p-2 text-slate-200 hover:text-rose-500"><Icon name="Trash2" size={20}/></button>
                                    <button onClick={() => setIsEdit(!isEdit)} className="p-2 text-slate-300 hover:text-emerald-500 transition-all">{isEdit ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                                </div>
                            </div>
                            <div className={`rounded-[2rem] p-6 ${config.bg} border-2 border-dashed ${config.border} min-h-[120px] transition-all flex flex-col items-center justify-center`}>
                                {isEdit ? <textarea value={tmp.innerWorld || ''} onChange={e => setTmp({...tmp, innerWorld: e.target.value})} placeholder="每一行代表一個情緒點...&#10;地雷越多震動越強！" className="w-full h-40 bg-white/60 border-none rounded-2xl p-4 text-sm font-medium outline-none resize-none text-center" /> :
                                <div className="space-y-3 w-full">{mines.length > 0 ? mines.map((m, i) => (<div key={i} className="flex items-center justify-center gap-2 text-slate-700 font-bold text-sm italic text-center"><Icon name="Zap" size={10} className="text-rose-300" fill="currentColor" /> {m}</div>)) : <p className="text-slate-400 text-sm font-medium italic text-center px-4">目前森林天氣晴朗，沒有地雷。</p>}</div>}
                            </div>
                            {isEdit && <button onClick={async () => { await onSave(side, tmp); setIsEdit(false); }} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm shadow-lg`}>同步情緒雷達</button>}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [events, setEvents] = useState([]);
            const [cities, setCities] = useState([]);
            const [profiles, setProfiles] = useState({ A: {}, B: {} });
            const [mySide, setMySide] = useState('A');
            const [newWish, setNewWish] = useState('');
            const [wishLocation, setWishLocation] = useState('');
            const [wishDate, setWishDate] = useState('');
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [showProfiles, setShowProfiles] = useState(false);
            const [showEvtForm, setShowEvtForm] = useState(false);
            const [showCityForm, setShowCityForm] = useState(false);
            const [isGrowing, setIsGrowing] = useState(false);
            const [dataLoaded, setDataLoaded] = useState(false);
            const [evtT, setEvtT] = useState(''); const [evtD, setEvtD] = useState('');
            const [cityT, setCityT] = useState(''); const [cityD, setCityD] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    if (window.fb) {
                        try {
                            await window.fb.signInAnonymously(window.fb.auth);
                            window.fb.onAuthStateChanged(window.fb.auth, (u) => { if (u) setUser(u); });
                        } catch (e) { setErrorMsg("連線失敗。"); }
                    }
                };
                const timer = setInterval(() => { if (window.fb) { clearInterval(timer); initAuth(); } }, 500);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (loading && !dataLoaded) {
                    const timeoutTimer = setTimeout(() => {
                        if (loading && !dataLoaded) setErrorMsg("連線超時：請確認 Rules 配置。");
                    }, 12000);
                    return () => clearTimeout(timeoutTimer);
                }
            }, [loading, dataLoaded]);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubW = onSnapshot(path('wishes'), snap => {
                    setWishes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setLoading(false); setDataLoaded(true);
                });
                const unsubE = onSnapshot(path('events'), snap => {
                    setEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => {
                        const statusA = getDateStatus(a.date); const statusB = getDateStatus(b.date);
                        if (statusA.type !== statusB.type) return statusA.type === 'future' ? -1 : 1;
                        return statusA.diff - statusB.diff;
                    }));
                });
                const unsubC = onSnapshot(path('cities'), snap => {
                    setCities(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });
                const unsubP = onSnapshot(path('profiles'), snap => {
                    const data = { A: {}, B: {} }; snap.docs.forEach(d => { data[d.id] = d.data(); }); setProfiles(data);
                });
                return () => { unsubW(); unsubE(); unsubC(); unsubP(); };
            }, [user]);

            const addWish = async (e) => {
                e.preventDefault(); if (!newWish.trim()) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes'), {
                    text: newWish, location: wishLocation, targetDate: wishDate, creatorSide: mySide, completed: false, createdAt: window.fb.serverTimestamp()
                });
                setNewWish(''); setWishLocation(''); setWishDate('');
            };
            const addEvent = async (e) => {
                e.preventDefault(); if (!evtT.trim() || !evtD) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'events'), { title: evtT, date: evtD, createdAt: window.fb.serverTimestamp() });
                setEvtT(''); setEvtD(''); setShowEvtForm(false);
            };
            const addCity = async (e) => {
                e.preventDefault(); if (!cityT.trim()) return;
                const cityList = cityT.split('\n').filter(c => c.trim() !== '');
                for (const name of cityList) {
                    await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'cities'), { name, date: cityD, creatorSide: mySide, createdAt: window.fb.serverTimestamp() });
                }
                setCityT(''); setCityD(''); setShowCityForm(false);
            };
            const deleteItem = async (col, id) => { await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', col, id)); };
            const toggleDone = async (item) => {
                const next = !item.completed; if(next) { setIsGrowing(true); setTimeout(() => setIsGrowing(false), 1500); }
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes', item.id), { completed: next });
            };
            const saveProfile = (s, d) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), d);
            const clearProfile = (s) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), { height:"", weight:"", shoeSize:"", favColor:"", innerWorld:"" });
            const clearMines = (s) => saveProfile(s, { ...profiles[s], innerWorld: "" });

            if (errorMsg && !dataLoaded) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center p-10 text-center text-rose-500">
                    <Icon name="Lock" size={48} className="mb-4" />
                    <h2 className="font-black text-xl mb-4 uppercase">森林門禁受阻</h2>
                    <div className="bg-white p-6 rounded-3xl border-2 border-rose-100 text-sm mb-6 leading-relaxed">{errorMsg}</div>
                    <button onClick={() => window.location.reload()} className="px-8 py-3 bg-rose-400 text-white rounded-full text-xs font-black shadow-lg">重新嘗試開啟</button>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center text-emerald-400 text-center">
                    <Icon name="Sparkles" className="animate-spin mb-4" size={32} />
                    <span className="text-xs font-black tracking-[0.3em] uppercase">進入森林中...</span>
                </div>
            );

            const progress = wishes.length > 0 ? Math.round((wishes.filter(w => w.completed).length / wishes.length) * 100) : 0;

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-slate-600 pb-32 relative text-center">
                    {showProfiles && (
                        <div className="fixed inset-0 z-[100] bg-white/60 backdrop-blur-2xl animate-in fade-in duration-300 overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12">
                                <div className="flex items-center justify-between mb-10 px-2 text-left">
                                    <button onClick={() => setShowProfiles(false)} className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 tap-active shadow-sm transition-all"><Icon name="ChevronLeft" size={24} /></button>
                                    <h2 className="font-black text-xl text-slate-800 tracking-widest uppercase">物理絕密卷宗</h2><div className="w-12 h-12"></div>
                                </div>
                                <ProfileCard side="A" data={profiles.A} onSave={saveProfile} onDelete={clearProfile} />

                            <div className="p-2 bg-emerald-50 rounded-xl text-emerald-500 shadow-inner animate-pulse"><Icon name="Heart" size={20} /></div>

                            <button onClick={() => setShowProfiles(true)} className="p-2.5 bg-emerald-50 rounded-2xl text-emerald-600 border border-emerald-100 shadow-sm hover:bg-emerald-500 hover:text-white transition-all tap-active"><Icon name="ShieldHeart" size={22} /></button>
                            <div className="flex bg-slate-100/50 p-1 rounded-2xl border border-slate-100 shadow-inner">
                                {Object.values(PARTNERS).map(p => (
                                    <button key={p.id} onClick={() => setMySide(p.id)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all tap-active ${mySide === p.id ? `${p.accent} text-white shadow-md` : 'text-slate-300'}`}>{p.displayName}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 mt-8">
                        <div className="flex flex-col items-center justify-center py-12 bg-emerald-50/20 rounded-[3.5rem] border border-emerald-100/50 mb-10 shadow-inner relative overflow-hidden">
                             <div className="absolute top-5 left-8 flex items-center gap-2 text-emerald-400/40 text-left font-black tracking-widest"><Icon name="TreePine" size={14} /><span className="text-[10px] uppercase">Dream Forest</span></div>
                             <Icon name="TreePine" className={`text-emerald-600 transition-all duration-700 ${progress > 50 ? 'scale-[1.8]' : progress > 20 ? 'scale-125' : 'scale-100'} ${isGrowing ? 'animate-bounce' : ''}`} size={64} />
                             <div className="mt-12 px-6 py-2 bg-white/80 rounded-full border border-emerald-200 shadow-sm flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div><p className="text-xs font-black text-emerald-800 tracking-tight">幸福能量：{progress}%</p></div>
                        </div>

                        <section className="mb-12">
                            <div className="flex justify-between items-center mb-5 px-1 text-left">
                                <div className="flex items-center gap-2 text-slate-400"><Icon name="Calendar" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">歲月星光紀錄儀</h3></div>
                                <button onClick={() => setShowEvtForm(!showEvtForm)} className="text-xs font-black bg-white border border-slate-200 px-4 py-1.5 rounded-full text-slate-400 hover:text-emerald-500 tap-active shadow-sm transition-all">{showEvtForm ? '取消' : '+ 記下日子'}</button>
                            </div>
                            {showEvtForm && (
                                <form onSubmit={addEvent} className="bg-white p-7 rounded-[2.5rem] border border-emerald-50 shadow-2xl mb-8 space-y-5 animate-in slide-in-from-top-4 relative z-20">
                                    <input placeholder="日子標題 (如：交往紀念日)..." className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner text-center" value={evtT} onChange={e=>setEvtT(e.target.value)} required />
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm shadow-inner text-center cursor-pointer" value={evtD} onChange={e=>setEvtD(e.target.value)} onClick={e=>e.target.showPicker && e.target.showPicker()} required />
                                    <button type="submit" className="w-full py-4 bg-emerald-400 text-white rounded-2xl font-black text-sm shadow-xl tap-active transition-all active:scale-95">儲存回憶時光</button>
                                </form>
                            )}
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                                {events.map(event => {
                                    const status = getDateStatus(event.date);
                                    const isSoon = status.type === 'future' && status.diff <= 7;
                                    return (
                                        <div key={event.id} className={`min-w-[170px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md relative ${isSoon ? 'reminder-glow' : ''}`}>
                                            <button onClick={() => deleteItem('events', event.id)} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-400 transition-opacity p-1"><Icon name="Trash2" size={14}/></button>
                                            {isSoon && <div className="absolute -top-2 left-1/2 -translate-x-1/2 px-3 py-1 bg-rose-400 text-white text-[9px] font-black rounded-full shadow-lg flex items-center gap-1 animate-bounce"><Icon name="Bell" size={10} fill="currentColor" /> 即將到來</div>}
                                            <div className={`w-10 h-10 mb-4 rounded-2xl mx-auto flex items-center justify-center shadow-inner ${isSoon ? 'bg-rose-50 text-rose-400 animate-pulse' : 'bg-emerald-50 text-emerald-500'}`}>{status.type === 'future' ? <Icon name="Sparkles" size={20} /> : <Icon name="Heart" size={18} fill="currentColor" />}</div>
                                            <h4 className="text-[11px] font-bold text-slate-500 truncate mb-1 px-2 text-center uppercase tracking-tighter">{event.title}</h4>
                                            <p className="text-[9px] font-black text-slate-300 mb-2">{formatFullDate(event.date)}</p>
                                            <div className="flex flex-col"><p className={`text-2xl font-black tracking-tighter ${isSoon ? 'text-rose-400' : 'text-slate-800'}`}>{status.diff.toLocaleString()}</p><span className="text-[10px] font-black opacity-30 uppercase tracking-widest leading-none">{status.type === 'future' ? '倒數中' : '累計天數'}</span></div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                            <div className="flex items-center gap-2 mb-5 px-1 text-slate-400 justify-center font-black uppercase tracking-[0.2em] text-xs">森林絕密：爆炸預警系統</div>

                            <LandmineSystem side="B" data={profiles.B} onSave={saveProfile} onDelete={clearMines} />

                            )}
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x min-h-[140px]">
                                {cities.length > 0 ? cities.map(city => {
                                    const status = getDateStatus(city.date);
                                    return (
                                        <div key={city.id} className="min-w-[150px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md relative overflow-hidden">

                                            <div className="w-10 h-10 mb-4 rounded-2xl mx-auto flex items-center justify-center bg-emerald-50 text-emerald-500 shadow-inner"><Icon name="Navigation" size={18} fill="currentColor" /></div>
                                            <h4 className="text-[13px] font-black text-slate-700 truncate mb-1 px-1">{city.name}</h4>
                                            {city.date && <p className="text-[9px] font-bold text-slate-300 mb-1">{formatFullDate(city.date)}</p>}
                                            <p className="text-xl font-black text-emerald-600 tracking-tighter leading-none">{status.diff.toLocaleString()}<span className="text-[9px] ml-1 uppercase opacity-40 font-black">Days</span></p>
                                        </div>
                                    );
                                }) : (
                                    <div className="w-full py-12 border-2 border-dashed border-emerald-100 rounded-[2.5rem] flex flex-col items-center justify-center text-slate-200">
                                        <Icon name="MapPin" size={24} className="mb-2 opacity-30" />
                                        <p className="text-xs font-bold uppercase tracking-widest">還沒點亮任何城市足跡喔</p>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    {/* 底部能量欄 */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50 text-left">
                        <div className="bg-white/90 backdrop-blur-2xl p-5 rounded-[2.5rem] shadow-2xl border border-emerald-100/50 flex items-center gap-6 ring-1 ring-emerald-50/50 transition-all">
                            <div className="flex-1">
                                <div className="flex justify-between items-center mb-2 px-1 text-[10px] font-black text-slate-400 uppercase tracking-widest"><span>森林總能量</span><span>{progress}%</span></div>
                                <div className="h-3 bg-emerald-50 rounded-full overflow-hidden p-0.5 border shadow-inner"><div className="h-full bg-gradient-to-r from-emerald-300 to-green-500 rounded-full transition-all duration-1000 ease-out shadow-sm" style={{ width: `${progress}%` }} /></div>
                            </div>
                            <div className={`p-3 rounded-2xl shadow-lg ring-4 ring-white transition-all duration-500 ${isGrowing ? 'bg-emerald-400 scale-125' : 'bg-emerald-500'} text-white shadow-emerald-100`}><Icon name="Heart" size={20} fill="currentColor" /></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

                Edit3: <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />,
                Bell: <React.Fragment><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></React.Fragment>,
                MapPin: <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></React.Fragment>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11" />,
                Droplets: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const appId = 'couple-dream-forest-v1';
        const PARTNERS = {
            A: { id: 'A', displayName: '糖糖', accent: 'bg-rose-400', border: 'border-rose-200', text: 'text-rose-400', bg: 'bg-rose-50', shadow: 'shadow-rose-100' },
            B: { id: 'B', displayName: '果果', accent: 'bg-sky-400', border: 'border-sky-200', text: 'text-sky-400', bg: 'bg-sky-50', shadow: 'shadow-sky-100' }
        };

        const getDateStatus = (dateStr) => {
            if (!dateStr) return { diff: 0, type: 'past' };
            const target = new Date(dateStr); target.setHours(0,0,0,0);
            const now = new Date(); now.setHours(0,0,0,0);
            const diffTime = target.getTime() - now.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays > 0) return { diff: diffDays, type: 'future' };
            return { diff: Math.abs(diffDays), type: 'past' };
        };

        const formatFullDate = (d) => d ? d.replace(/-/g, " . ") : "";

        // --- 組件：物理卷宗 ---
        const ProfileCard = ({ side, data, onSave, onDelete }) => {
            const [isEdit, setIsEdit] = useState(false);
            const [tmp, setTmp] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTmp(data || {}); }, [data]);
            const fields = [{l:'海拔高度', k:'height'}, {l:'森林佔地重', k:'weight'}, {l:'腳掌面積', k:'shoeSize'}, {l:'視覺偏好', k:'favColor'}];
            return (
                <div className={`w-full bg-white rounded-[2.5rem] p-8 border-2 ${config.border} shadow-xl mb-6 relative overflow-hidden`}>
                    <div className="flex justify-between items-center mb-6 px-2">
                        <div className="flex items-center gap-4 text-left">
                            <div className={`w-12 h-12 rounded-[1.2rem] ${config.accent} flex items-center justify-center text-white shadow-lg`}><Icon name="ShieldHeart" size={24} /></div>
                            <h3 className={`font-black text-xl ${config.text}`}>{config.displayName} 卷宗</h3>
                        </div>
                        <div className="flex gap-1">
                            <button onClick={() => { if(confirm('要清空卷宗數據嗎？')) onDelete(side); }} className="p-2 text-slate-200 hover:text-rose-400 transition-colors"><Icon name="Trash2" size={18}/></button>
                            <button onClick={() => setIsEdit(!isEdit)} className="p-2 text-slate-300 hover:text-emerald-500 tap-active transition-all">{isEdit ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-4 text-center">
                        {fields.map(f => (
                            <div key={f.k} className="flex flex-col border-b border-slate-50 pb-3">
                                <span className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-1">{f.l}</span>
                                {isEdit ? <input value={tmp[f.k] || ''} onChange={e => setTmp({...tmp, [f.k]: e.target.value})} className="bg-slate-50 border-none rounded-xl px-3 py-1 text-center text-sm font-bold outline-none" /> : <span className="text-slate-700 font-black text-sm">{data?.[f.k] || '---'}</span>}
                            </div>
                        ))}
                    </div>
                    {isEdit && <button onClick={async () => { await onSave(side, tmp); setIsEdit(false); }} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm active:scale-95 shadow-lg`}>存入雲端備案</button>}
                </div>
            );
        };

        // --- 組件：地雷分級系統 ---
        const LandmineSystem = ({ side, data, onSave, onDelete }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isEdit, setIsEdit] = useState(false);
            const [tmp, setTmp] = useState(data || {});
            const config = PARTNERS[side];
            useEffect(() => { setTmp(data || {}); }, [data]);
            const mines = useMemo(() => data?.innerWorld?.split('\n').filter(l => l.trim() !== '') || [], [data]);
            const count = mines.length;
            const level = count === 0 ? 0 : count <= 2 ? 1 : count <= 5 ? 2 : 3;
            const renderIcon = () => {
                if (level === 0) return <Icon name="Landmine" size={22} />;
                if (level === 1) return <Icon name="Landmine" className="text-yellow-400 mine-level-1" size={24} fill="currentColor" />;
                if (level === 2) return <Icon name="Bomb" className="text-orange-500 mine-level-2" size={26} fill="currentColor" />;
                return <Icon name="Flame" className="text-rose-600 mine-level-3 kaboom-pulse" size={30} fill="currentColor" />;
            };
            return (
                <div className={`w-full transition-all duration-500 ${isOpen ? 'mb-10' : 'mb-3'}`}>
                    <button onClick={() => setIsOpen(!isOpen)} className={`w-full flex items-center justify-between p-6 rounded-[2.5rem] border-2 tap-active ${isOpen ? `${config.border} bg-white shadow-xl` : 'bg-slate-50 border-transparent hover:bg-white shadow-sm'}`}>
                        <div className="flex items-center gap-4">
                            <div className={`w-14 h-14 rounded-full flex items-center justify-center transition-all ${isOpen ? `${config.accent} text-white` : 'bg-white text-slate-400 shadow-inner'}`}>{renderIcon()}</div>
                            <div className="text-left"><span className={`block font-black text-sm uppercase tracking-widest ${isOpen ? config.text : 'text-slate-400'}`}>{config.displayName} 爆炸預警</span>{level > 0 && <span className="text-[10px] font-black text-rose-400 animate-pulse uppercase">偵測到 {count} 項情緒地雷</span>}</div>
                        </div>
                        <Icon name="ChevronDown" size={18} className={`text-slate-300 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {isOpen && (
                        <div className={`mt-4 bg-white p-8 rounded-[3rem] border-2 ${config.border} shadow-2xl relative animate-in zoom-in-95`}>
                            <div className="flex justify-between items-center mb-6 px-1">
                                <span className="text-[10px] font-black text-rose-400 tracking-widest flex items-center gap-2"><Icon name="Zap" size={12} className="animate-bounce" /> 批次心聲讀取中</span>
                                <div className="flex gap-2">
                                    <button onClick={() => { if(confirm('確定要引爆並清空所有地雷嗎？')) onDelete(side); }} className="p-2 text-slate-200 hover:text-rose-500"><Icon name="Trash2" size={20}/></button>
                                    <button onClick={() => setIsEdit(!isEdit)} className="p-2 text-slate-300 hover:text-emerald-500 transition-all">{isEdit ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                                </div>
                            </div>
                            <div className={`rounded-[2rem] p-6 ${config.bg} border-2 border-dashed ${config.border} min-h-[120px] transition-all flex flex-col items-center justify-center`}>
                                {isEdit ? <textarea value={tmp.innerWorld || ''} onChange={e => setTmp({...tmp, innerWorld: e.target.value})} placeholder="每一行代表一個情緒點...&#10;地雷越多震動越強！" className="w-full h-40 bg-white/60 border-none rounded-2xl p-4 text-sm font-medium outline-none resize-none text-center" /> :
                                <div className="space-y-3 w-full">{mines.length > 0 ? mines.map((m, i) => (<div key={i} className="flex items-center justify-center gap-2 text-slate-700 font-bold text-sm italic text-center"><Icon name="Zap" size={10} className="text-rose-300" fill="currentColor" /> {m}</div>)) : <p className="text-slate-400 text-sm font-medium italic text-center px-4">目前森林天氣晴朗，沒有地雷。</p>}</div>}
                            </div>
                            {isEdit && <button onClick={async () => { await onSave(side, tmp); setIsEdit(false); }} className={`w-full mt-6 py-4 ${config.accent} text-white rounded-2xl font-black text-sm shadow-lg`}>同步情緒雷達</button>}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [events, setEvents] = useState([]);
            const [cities, setCities] = useState([]);
            const [profiles, setProfiles] = useState({ A: {}, B: {} });
            const [mySide, setMySide] = useState('A');
            const [newWish, setNewWish] = useState('');
            const [wishLocation, setWishLocation] = useState('');
            const [wishDate, setWishDate] = useState('');
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [showProfiles, setShowProfiles] = useState(false);
            const [showEvtForm, setShowEvtForm] = useState(false);
            const [showCityForm, setShowCityForm] = useState(false);
            const [isGrowing, setIsGrowing] = useState(false);
            const [dataLoaded, setDataLoaded] = useState(false);
            const [evtT, setEvtT] = useState(''); const [evtD, setEvtD] = useState('');
            const [cityT, setCityT] = useState(''); const [cityD, setCityD] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    if (window.fb) {
                        try {
                            await window.fb.signInAnonymously(window.fb.auth);
                            window.fb.onAuthStateChanged(window.fb.auth, (u) => { if (u) setUser(u); });
                        } catch (e) { setErrorMsg("連線失敗。"); }
                    }
                };
                const timer = setInterval(() => { if (window.fb) { clearInterval(timer); initAuth(); } }, 500);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (loading && !dataLoaded) {
                    const timeoutTimer = setTimeout(() => {
                        if (loading && !dataLoaded) setErrorMsg("連線超時：請確認 Rules 配置。");
                    }, 12000);
                    return () => clearTimeout(timeoutTimer);
                }
            }, [loading, dataLoaded]);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubW = onSnapshot(path('wishes'), snap => {
                    setWishes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setLoading(false); setDataLoaded(true);
                });
                const unsubE = onSnapshot(path('events'), snap => {
                    setEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => {
                        const statusA = getDateStatus(a.date); const statusB = getDateStatus(b.date);
                        if (statusA.type !== statusB.type) return statusA.type === 'future' ? -1 : 1;
                        return statusA.diff - statusB.diff;
                    }));
                });
                const unsubC = onSnapshot(path('cities'), snap => {
                    setCities(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });
                const unsubP = onSnapshot(path('profiles'), snap => {
                    const data = { A: {}, B: {} }; snap.docs.forEach(d => { data[d.id] = d.data(); }); setProfiles(data);
                });
                return () => { unsubW(); unsubE(); unsubC(); unsubP(); };
            }, [user]);

            const addWish = async (e) => {
                e.preventDefault(); if (!newWish.trim()) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes'), {
                    text: newWish, location: wishLocation, targetDate: wishDate, creatorSide: mySide, completed: false, createdAt: window.fb.serverTimestamp()
                });
                setNewWish(''); setWishLocation(''); setWishDate('');
            };
            const addEvent = async (e) => {
                e.preventDefault(); if (!evtT.trim() || !evtD) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'events'), { title: evtT, date: evtD, createdAt: window.fb.serverTimestamp() });
                setEvtT(''); setEvtD(''); setShowEvtForm(false);
            };
            const addCity = async (e) => {
                e.preventDefault(); if (!cityT.trim()) return;
                const cityList = cityT.split('\n').filter(c => c.trim() !== '');
                for (const name of cityList) {
                    await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'cities'), { name, date: cityD, creatorSide: mySide, createdAt: window.fb.serverTimestamp() });
                }
                setCityT(''); setCityD(''); setShowCityForm(false);
            };
            const deleteItem = async (col, id) => { await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', col, id)); };
            const toggleDone = async (item) => {
                const next = !item.completed; if(next) { setIsGrowing(true); setTimeout(() => setIsGrowing(false), 1500); }
                await window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes', item.id), { completed: next });
            };
            const saveProfile = (s, d) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), d);
            const clearProfile = (s) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), { height:"", weight:"", shoeSize:"", favColor:"", innerWorld:"" });
            const clearMines = (s) => saveProfile(s, { ...profiles[s], innerWorld: "" });

            if (errorMsg && !dataLoaded) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center p-10 text-center text-rose-500">
                    <Icon name="Lock" size={48} className="mb-4" />
                    <h2 className="font-black text-xl mb-4 uppercase">森林門禁受阻</h2>
                    <div className="bg-white p-6 rounded-3xl border-2 border-rose-100 text-sm mb-6 leading-relaxed">{errorMsg}</div>
                    <button onClick={() => window.location.reload()} className="px-8 py-3 bg-rose-400 text-white rounded-full text-xs font-black shadow-lg">重新嘗試開啟</button>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen bg-[#FDFCF8] flex flex-col items-center justify-center text-emerald-400 text-center">
                    <Icon name="Sparkles" className="animate-spin mb-4" size={32} />
                    <span className="text-xs font-black tracking-[0.3em] uppercase">進入森林中...</span>
                </div>
            );

            const progress = wishes.length > 0 ? Math.round((wishes.filter(w => w.completed).length / wishes.length) * 100) : 0;

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-slate-600 pb-32 relative text-center">
                    {showProfiles && (
                        <div className="fixed inset-0 z-[100] bg-white/60 backdrop-blur-2xl animate-in fade-in duration-300 overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12">
                                <div className="flex items-center justify-between mb-10 px-2 text-left">
                                    <button onClick={() => setShowProfiles(false)} className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 tap-active shadow-sm transition-all"><Icon name="ChevronLeft" size={24} /></button>
                                    <h2 className="font-black text-xl text-slate-800 tracking-widest uppercase">物理絕密卷宗</h2><div className="w-12 h-12"></div>
                                </div>
                                <ProfileCard side="A" data={profiles.A} onSave={saveProfile} onDelete={clearProfile} />
                                <ProfileCard side="B" data={profiles.B} onSave={saveProfile} onDelete={clearProfile} />
                            </div>
                        </div>
                    )}

                    <header className="bg-white/80 backdrop-blur-xl sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-emerald-50">
                        <div className="flex items-center gap-3 text-left">
                            <div className="p-2 bg-emerald-50 rounded-xl text-emerald-500 shadow-inner animate-pulse"><Icon name="Heart" size={20} /></div>
                            <h1 className="font-black text-lg text-emerald-800 leading-none tracking-tight">夢想森林</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setShowProfiles(true)} className="p-2.5 bg-emerald-50 rounded-2xl text-emerald-600 border border-emerald-100 shadow-sm hover:bg-emerald-500 hover:text-white transition-all tap-active"><Icon name="ShieldHeart" size={22} /></button>
                            <div className="flex bg-slate-100/50 p-1 rounded-2xl border border-slate-100 shadow-inner">
                                {Object.values(PARTNERS).map(p => (
                                    <button key={p.id} onClick={() => setMySide(p.id)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all tap-active ${mySide === p.id ? `${p.accent} text-white shadow-md` : 'text-slate-300'}`}>{p.displayName}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 mt-8">
                        <div className="flex flex-col items-center justify-center py-12 bg-emerald-50/20 rounded-[3.5rem] border border-emerald-100/50 mb-10 shadow-inner relative overflow-hidden">
                             <div className="absolute top-5 left-8 flex items-center gap-2 text-emerald-400/40 text-left font-black tracking-widest"><Icon name="TreePine" size={14} /><span className="text-[10px] uppercase">Dream Forest</span></div>
                             <Icon name="TreePine" className={`text-emerald-600 transition-all duration-700 ${progress > 50 ? 'scale-[1.8]' : progress > 20 ? 'scale-125' : 'scale-100'} ${isGrowing ? 'animate-bounce' : ''}`} size={64} />
                             <div className="mt-12 px-6 py-2 bg-white/80 rounded-full border border-emerald-200 shadow-sm flex items-center gap-3"><div className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div><p className="text-xs font-black text-emerald-800 tracking-tight">幸福能量：{progress}%</p></div>
                        </div>

                        <section className="mb-12">
                            <div className="flex justify-between items-center mb-5 px-1 text-left">
                                <div className="flex items-center gap-2 text-slate-400"><Icon name="Calendar" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">歲月星光紀錄儀</h3></div>
                                <button onClick={() => setShowEvtForm(!showEvtForm)} className="text-xs font-black bg-white border border-slate-200 px-4 py-1.5 rounded-full text-slate-400 hover:text-emerald-500 tap-active shadow-sm transition-all">{showEvtForm ? '取消' : '+ 記下日子'}</button>
                            </div>
                            {showEvtForm && (
                                <form onSubmit={addEvent} className="bg-white p-7 rounded-[2.5rem] border border-emerald-50 shadow-2xl mb-8 space-y-5 animate-in slide-in-from-top-4 relative z-20">
                                    <input placeholder="日子標題 (如：交往紀念日)..." className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner text-center" value={evtT} onChange={e=>setEvtT(e.target.value)} required />
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm shadow-inner text-center cursor-pointer" value={evtD} onChange={e=>setEvtD(e.target.value)} onClick={e=>e.target.showPicker && e.target.showPicker()} required />
                                    <button type="submit" className="w-full py-4 bg-emerald-400 text-white rounded-2xl font-black text-sm shadow-xl tap-active transition-all active:scale-95">儲存回憶時光</button>
                                </form>
                            )}
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                                {events.map(event => {
                                    const status = getDateStatus(event.date);
                                    const isSoon = status.type === 'future' && status.diff <= 7;
                                    return (
                                        <div key={event.id} className={`min-w-[170px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md relative ${isSoon ? 'reminder-glow' : ''}`}>
                                            <button onClick={() => deleteItem('events', event.id)} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-400 transition-opacity p-1"><Icon name="Trash2" size={14}/></button>
                                            {isSoon && <div className="absolute -top-2 left-1/2 -translate-x-1/2 px-3 py-1 bg-rose-400 text-white text-[9px] font-black rounded-full shadow-lg flex items-center gap-1 animate-bounce"><Icon name="Bell" size={10} fill="currentColor" /> 即將到來</div>}
                                            <div className={`w-10 h-10 mb-4 rounded-2xl mx-auto flex items-center justify-center shadow-inner ${isSoon ? 'bg-rose-50 text-rose-400 animate-pulse' : 'bg-emerald-50 text-emerald-500'}`}>{status.type === 'future' ? <Icon name="Sparkles" size={20} /> : <Icon name="Heart" size={18} fill="currentColor" />}</div>
                                            <h4 className="text-[11px] font-bold text-slate-500 truncate mb-1 px-2 text-center uppercase tracking-tighter">{event.title}</h4>
                                            <p className="text-[9px] font-black text-slate-300 mb-2">{formatFullDate(event.date)}</p>
                                            <div className="flex flex-col"><p className={`text-2xl font-black tracking-tighter ${isSoon ? 'text-rose-400' : 'text-slate-800'}`}>{status.diff.toLocaleString()}</p><span className="text-[10px] font-black opacity-30 uppercase tracking-widest leading-none">{status.type === 'future' ? '倒數中' : '累計天數'}</span></div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        <section className="mb-12 text-center">
                            <div className="flex items-center gap-2 mb-5 px-1 text-slate-400 justify-center font-black uppercase tracking-[0.2em] text-xs">森林絕密：爆炸預警系統</div>
                            <LandmineSystem side="A" data={profiles.A} onSave={saveProfile} onDelete={clearMines} />
                            <LandmineSystem side="B" data={profiles.B} onSave={saveProfile} onDelete={clearMines} />
                        </section>

                        <section className="mb-12">
                            <div className="flex items-center gap-2 mb-4 px-1 text-slate-400 justify-center"><Icon name="Plus" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">投遞許願瓶</h3></div>
                            <div className={`bg-white rounded-[3rem] p-8 shadow-2xl border-2 transition-all duration-700 ${PARTNERS[mySide].border}`}>
                                <form onSubmit={addWish} className="space-y-4 text-center">
                                    <textarea value={newWish} onChange={e=>setNewWish(e.target.value)} placeholder={`想一起去做什麼夢？`} className="w-full p-4 bg-slate-50/50 rounded-2xl border-none outline-none h-24 text-lg font-medium resize-none placeholder:text-slate-300 text-center" />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div className="relative"><input value={wishLocation} onChange={e=>setWishLocation(e.target.value)} placeholder="哪裡？ (選填)" className="w-full bg-slate-50/50 p-4 pl-10 rounded-2xl border-none outline-none text-sm font-bold text-center" /><Icon name="MapPin" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" /></div>
                                        <div className="relative"><input type="date" value={wishDate} onChange={e=>setWishDate(e.target.value)} onClick={e=>e.target.showPicker && e.target.showPicker()} className="w-full bg-slate-50/50 p-4 pl-10 rounded-2xl border-none outline-none text-sm text-center cursor-pointer" /><Icon name="Calendar" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" /></div>
                                    </div>
                                    <button type="submit" disabled={!newWish.trim()} className={`w-full py-5 ${PARTNERS[mySide].accent} text-white rounded-[2rem] font-black text-md shadow-xl tap-active transition-all active:scale-95`}>拋向森林 🍾</button>
                                </form>
                            </div>
                        </section>

                        <div className="space-y-8 mb-12 min-h-[100px]">
                            {wishes.map((item) => {
                                const side = PARTNERS[item.creatorSide || 'A'];
                                const dateStat = item.targetDate ? getDateStatus(item.targetDate) : null;
                                return (
                                    <div key={item.id} className={`relative p-8 rounded-[3.5rem] border transition-all ${item.completed ? 'opacity-40 grayscale bg-slate-50 border-slate-100 shadow-none' : `bg-white ${side.border} shadow-lg shadow-emerald-50/20`}`}>
                                        <div className="flex justify-between items-start mb-5">
                                            <span className={`px-4 py-1 rounded-full ${item.completed ? 'bg-slate-200 text-slate-400' : `${side.accent} text-white`} text-[10px] font-black uppercase tracking-widest`}>願願瓶</span>
                                            <button onClick={() => deleteItem('wishes', item.id)} className="text-slate-300 hover:text-rose-400 p-1 transition-colors"><Icon name="Trash2" size={16} /></button>
                                        </div>
                                        <p className={`text-slate-700 font-black mb-6 text-xl text-left leading-relaxed px-2 ${item.completed ? 'line-through text-slate-300' : ''}`}>{item.text}</p>
                                        {(item.location || item.targetDate) && (
                                            <div className="flex flex-wrap gap-3 mb-8 px-2">
                                                {item.location && <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-xl text-slate-500 text-xs font-bold"><Icon name="MapPin" size={12} fill="currentColor" className="text-emerald-400" /> {item.location}</div>}
                                                {item.targetDate && <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-xl text-slate-500 text-xs font-bold"><Icon name="Calendar" size={12} className="text-rose-300" /> {formatFullDate(item.targetDate)} {dateStat && dateStat.type === 'future' && <span className="ml-1 text-rose-400 text-[10px] font-black">(剩 {dateStat.diff} 天)</span>}</div>}
                                            </div>
                                        )}
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2 text-left">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black text-white shadow-md ${side.accent}`}>{side.displayName[0]}</div>
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">{side.displayName}</span>
                                            </div>
                                            <button onClick={() => toggleDone(item)} className={`px-7 py-3 rounded-full text-[13px] font-black border transition-all tap-active ${item.completed ? 'bg-emerald-500 text-white border-transparent shadow-none' : 'bg-white text-slate-300 border-slate-100 hover:border-emerald-200 hover:text-emerald-600'}`}>{item.completed ? '願望達成' : '灌溉願望'}</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* 足跡區塊：移至最下方 */}
                        <section className="mb-24">
                            <div className="flex justify-between items-center mb-5 px-1 text-left">
                                <div className="flex items-center gap-2 text-slate-400"><Icon name="MapPin" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">夢想足跡：城市地圖</h3></div>
                                <button onClick={() => setShowCityForm(!showCityForm)} className="text-xs font-black bg-white border border-slate-200 px-4 py-1.5 rounded-full text-slate-400 hover:text-emerald-500 tap-active shadow-sm transition-all">{showCityForm ? '取消' : '+ 點亮足跡'}</button>
                            </div>
                            {showCityForm && (
                                <form onSubmit={addCity} className="bg-white p-7 rounded-[2.5rem] border border-emerald-50 shadow-2xl mb-8 space-y-4 animate-in slide-in-from-top-4 relative z-20">
                                    <textarea placeholder="去過的城市 (每行一個城市可批次新增)..." className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner text-center h-24" value={cityT} onChange={e=>setCityT(e.target.value)} required />
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm shadow-inner text-center cursor-pointer" value={cityD} onChange={e=>setCityD(e.target.value)} onClick={e=>e.target.showPicker && e.target.showPicker()} />
                                    <button type="submit" className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black text-sm shadow-xl tap-active active:scale-95 transition-all">點亮城市回憶</button>
                                </form>
                            )}
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x min-h-[140px]">
                                {cities.length > 0 ? cities.map(city => {
                                    const status = getDateStatus(city.date);
                                    return (
                                        <div key={city.id} className="min-w-[150px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md relative overflow-hidden">
                                            <button onClick={() => deleteItem('cities', city.id)} className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-400 transition-opacity p-1"><Icon name="Trash2" size={12}/></button>
                                            <div className="w-10 h-10 mb-4 rounded-2xl mx-auto flex items-center justify-center bg-emerald-50 text-emerald-500 shadow-inner"><Icon name="Navigation" size={18} fill="currentColor" /></div>
                                            <h4 className="text-[13px] font-black text-slate-700 truncate mb-1 px-1">{city.name}</h4>
                                            {city.date && <p className="text-[9px] font-bold text-slate-300 mb-1">{formatFullDate(city.date)}</p>}
                                            <p className="text-xl font-black text-emerald-600 tracking-tighter leading-none">{status.diff.toLocaleString()}<span className="text-[9px] ml-1 uppercase opacity-40 font-black">Days</span></p>
                                        </div>
                                    );
                                }) : (
                                    <div className="w-full py-12 border-2 border-dashed border-emerald-100 rounded-[2.5rem] flex flex-col items-center justify-center text-slate-200">
                                        <Icon name="MapPin" size={24} className="mb-2 opacity-30" />
                                        <p className="text-xs font-bold uppercase tracking-widest">還沒點亮任何城市足跡喔</p>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    {/* 底部能量欄 */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50 text-left">
                        <div className="bg-white/90 backdrop-blur-2xl p-5 rounded-[2.5rem] shadow-2xl border border-emerald-100/50 flex items-center gap-6 ring-1 ring-emerald-50/50 transition-all">
                            <div className="flex-1">
                                <div className="flex justify-between items-center mb-2 px-1 text-[10px] font-black text-slate-400 uppercase tracking-widest"><span>森林總能量</span><span>{progress}%</span></div>
                                <div className="h-3 bg-emerald-50 rounded-full overflow-hidden p-0.5 border shadow-inner"><div className="h-full bg-gradient-to-r from-emerald-300 to-green-500 rounded-full transition-all duration-1000 ease-out shadow-sm" style={{ width: `${progress}%` }} /></div>
                            </div>
                            <div className={`p-3 rounded-2xl shadow-lg ring-4 ring-white transition-all duration-500 ${isGrowing ? 'bg-emerald-400 scale-125' : 'bg-emerald-500'} text-white shadow-emerald-100`}><Icon name="Heart" size={20} fill="currentColor" /></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
