                Mail: <React.Fragment><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /><rect width="20" height="16" x="2" y="4" rx="2" /></React.Fragment>,
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const SafeDeleteBtn = ({ onDelete, className = "" }) => {
            const [confirming, setConfirming] = useState(false);
            useEffect(() => { if (confirming) { const t = setTimeout(() => setConfirming(false), 3000); return () => clearTimeout(t); } }, [confirming]);
            return (
                <button onClick={(e) => { e.stopPropagation(); confirming ? onDelete() : setConfirming(true); }} className={`${className} transition-all flex items-center gap-1 ${confirming ? 'bg-rose-500 text-white px-2 rounded-lg py-1 scale-105 shadow-md' : 'text-slate-200 hover:text-rose-400'}`}>
                    <Icon name="Trash2" size={14} /> {confirming && <span className="text-[10px] font-black tracking-tighter">確認？</span>}
                </button>
            );
        };

        const InlineLandmineSystem = ({ side, data, onSave, onDelete }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isEdit, setIsEdit] = useState(false);
            const [localText, setLocalText] = useState(data?.innerWorld || '');
            const config = PARTNERS[side];
            useEffect(() => { setLocalText(data?.innerWorld || ''); }, [data]);
            const mines = useMemo(() => localText.split('\n').filter(l => l.trim() !== ''), [localText]);
            const level = mines.length === 0 ? 0 : mines.length <= 2 ? 1 : mines.length <= 5 ? 2 : 3;
            const style = (() => {
                if (level === 0) return { color: 'text-slate-300', shake: '', bg: 'bg-slate-50' };
                if (level === 1) return { color: 'text-amber-400', shake: 'mine-shake-1', bg: 'bg-amber-50' };
                if (level === 2) return { color: 'text-orange-500', shake: 'mine-shake-2', bg: 'bg-orange-50' };
                return { color: 'text-rose-600', shake: 'mine-shake-3', bg: 'bg-rose-50' };
            })();
            return (
                <div className="w-full mb-4">
                    <div className={`w-full flex items-center justify-between p-6 rounded-[2.5rem] border-2 transition-all ${isOpen ? `${config.border} bg-white shadow-xl` : `${style.bg} border-transparent hover:bg-white shadow-sm`}`}>
                        <div className="flex items-center gap-4 text-left cursor-pointer flex-1" onClick={() => setIsOpen(!isOpen)}>
                            <div className={`w-14 h-14 rounded-full flex items-center justify-center transition-all ${style.bg} ${style.color} ${style.shake} shadow-inner`}>
                                <Icon name="Landmine" size={32} fill={level > 0 ? "currentColor" : "none"} />
                            </div>
                            <div>
                                <span className={`block font-black text-sm uppercase tracking-widest ${isOpen ? config.text : 'text-slate-400'}`}>{config.displayName} 心情雷達</span>
                                {level > 0 && <span className={`text-[10px] font-black animate-pulse uppercase tracking-tighter ${style.color}`}>偵測到 {mines.length} 處不開心</span>}
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <SafeDeleteBtn onDelete={() => { onDelete(side); setLocalText(''); }} />
                            <button onClick={() => { setIsOpen(true); setIsEdit(!isEdit); }} className={`p-2 transition-colors ${isEdit ? 'text-rose-400' : 'text-slate-300 hover:text-emerald-500'}`}>{isEdit ? <Icon name="X" size={20} /> : <Icon name="Edit3" size={20} />}</button>
                        </div>
                    </div>
                    {isOpen && (
                        <div className={`mt-4 bg-white p-7 rounded-[3rem] border-2 ${config.border} shadow-2xl animate-in zoom-in-95`}>
                            <div className={`rounded-[2rem] p-6 ${style.bg} border-2 border-dashed ${style.color === 'text-slate-300' ? 'border-slate-100' : style.color.replace('text', 'border')} min-h-[120px] transition-all flex flex-col items-center justify-center text-center`}>
                                {isEdit ? (
                                    <div className="w-full space-y-4">
                                        <textarea value={localText} onChange={e => setLocalText(e.target.value)} placeholder="在此輸入目前不開心的點..." className="w-full h-40 bg-white/70 border-none rounded-2xl p-4 text-sm font-bold outline-none resize-none text-center shadow-inner placeholder:text-slate-200" />
                                        <button onClick={async () => { await onSave(side, {...data, innerWorld: localText}); setIsEdit(false); }} className={`w-full py-4 ${config.accent} text-white rounded-2xl font-black text-sm shadow-lg active:scale-95`}>同步雷達</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4 w-full text-center">{mines.length > 0 ? mines.map((m, i) => (
                                        <div key={i} className={`flex items-center justify-center gap-2 font-bold text-sm italic py-1 border-b border-white/40 last:border-none ${style.color}`}><Icon name="Landmine" size={14} fill="currentColor" /> {m}</div>
                                    )) : <p className="text-slate-400 text-sm font-medium italic">目前心情森林風平浪靜。</p>}</div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LoveTree = ({ progress, isGrowing }) => {
            const renderTree = () => {
                const animationClass = isGrowing ? "animate-bounce" : "";
                if (progress === 0) return <div className="text-amber-700 mt-10 flex flex-col items-center text-center"><div className="w-5 h-5 bg-amber-800 rounded-full"></div><span className="text-[10px] mt-2 font-black opacity-40 uppercase">Seeds</span></div>;
                if (progress < 30) return <div className={`text-emerald-500 mt-6 ${animationClass}`}><Icon name="TreePine" size={52} /></div>;
                if (progress < 60) return <div className={`text-emerald-600 scale-125 mt-4 ${animationClass}`}><Icon name="TreePine" size={60} /></div>;
                if (progress < 90) return <div className={`relative text-green-700 scale-150 mt-2 ${animationClass}`}><Icon name="TreePine" size={68} /></div>;
                return <div className={`relative text-green-800 scale-[1.8] mt-2 ${animationClass}`}><Icon name="TreePine" size={72} /><div className="absolute inset-0 flex items-center justify-center"><Icon name="Heart" className="text-rose-400/60 fill-current animate-ping" size={24} /></div></div>;
            };
            return (
                <div className="flex flex-col items-center justify-center py-14 bg-gradient-to-b from-emerald-50/20 to-emerald-100/30 rounded-[3.5rem] border border-emerald-100/50 mb-10 overflow-hidden relative shadow-inner">
                    <div className="absolute top-5 left-8 flex items-center gap-2 text-emerald-500/50 font-black tracking-widest text-[10px] uppercase">Dream Forest</div>
                    {renderTree()}
                    <div className="mt-12 flex flex-col items-center gap-2">
                        <div className="px-6 py-2 bg-white/80 rounded-full border border-emerald-200 shadow-sm flex items-center gap-3">
                            <div className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div>
                            <p className="text-xs font-black text-emerald-800 tracking-tight">幸福能量：{progress}%</p>
                        </div>
                    </div>
                </div>
            );
        };

        const LocationPicker = ({ county, town, onCountyChange, onTownChange, isOptional = true }) => {
            return (
                <div className="grid grid-cols-2 gap-2">
                    <select value={county} onChange={e => onCountyChange(e.target.value)} className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold text-center appearance-none shadow-inner input-pale ${county ? 'has-value' : ''}`}>
                        <option value="">{isOptional ? '地點縣市 (選填)' : '選擇縣市'}</option>
                        {Object.keys(TW_MAP_DATA).map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                    <select value={town} onChange={e => onTownChange(e.target.value)} disabled={!county} className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold text-center appearance-none disabled:opacity-50 shadow-inner input-pale ${town ? 'has-value' : ''}`}>
                        <option value="">{isOptional ? '鄉鎮區 (選填)' : '選擇鄉鎮'}</option>
                        {(TW_MAP_DATA[county] || []).map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                </div>
            );
        };

        const TaiwanProfessionalMap = ({ groupedFootprints, onCountyClick }) => {
            const counties = Object.keys(COUNTY_COORDS);
            return (
                <svg viewBox="0 0 100 120" className="w-full h-full">
                    <defs>
                        <filter id="shadowMap" x="-0.2" y="-0.2" width="1.4" height="1.4">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
                            <feOffset dx="1" dy="1" result="offsetblur" />
                            <feComponentTransfer><feFuncA type="linear" slope="0.2" /></feComponentTransfer>
                            <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
                        </filter>
                    </defs>
                    <g filter="url(#shadowMap)">
                        {counties.map(name => {
                            const pos = COUNTY_COORDS[name];
                            const hasActivity = Object.keys(groupedFootprints).some(loc => loc.includes(name));
                            return (
                                <g key={name} className="group" onClick={() => onCountyClick(name)}>
                                    <circle 
                                        cx={pos.x} cy={pos.y} r={hasActivity ? 4 : 3} 
                                        className={`county-path transition-all duration-500 cursor-pointer ${hasActivity ? 'fill-emerald-500 stroke-emerald-600' : 'fill-slate-100 stroke-slate-200'} hover:fill-emerald-400`}
                                        strokeWidth="0.5"
                                    />
                                </g>
                            );
                        })}
                    </g>
                    <path d="M72,5 Q85,10 82,25 T78,40 T74,60 T68,85 T55,110 T40,115 T30,85 T35,50 T65,10 Z" fill="none" stroke="#10b981" strokeWidth="0.5" strokeOpacity="0.1" />
                </svg>
            );
        };

        // --- 4. 主應用 ---
        function App() {
            const [user, setUser] = useState(null);
            const [wishes, setWishes] = useState([]);
            const [cities, setCities] = useState([]);
            const [events, setEvents] = useState([]);
            const [notes, setNotes] = useState([]);
            const [profiles, setProfiles] = useState({ A: {}, B: {} });
            const [mySide, setMySide] = useState('A');
            const [loading, setLoading] = useState(true);
            const [showProfiles, setShowProfiles] = useState(false);
            const [showGuardian, setShowGuardian] = useState(false);
            const [historyCity, setHistoryCity] = useState(null);
            const [isGrowing, setIsGrowing] = useState(false);
            
            // 表單 State
            const [newWish, setNewWish] = useState('');
            const [wishCounty, setWishCounty] = useState('');
            const [wishTown, setWishTown] = useState('');
            const [wishDate, setWishDate] = useState('');

            const [showEvtForm, setShowEvtForm] = useState(false);
            const [evtT, setEvtT] = useState(''); const [evtD, setEvtD] = useState(''); const [evtC, setEvtC] = useState('rose');

            const [showCityForm, setShowCityForm] = useState(false);
            const [cityCounty, setCityCounty] = useState('');
            const [cityTown, setCityTown] = useState('');
            const [cityDate, setCityDate] = useState('');

            const [newNote, setNewNote] = useState('');

            const progress = useMemo(() => wishes.length === 0 ? 0 : Math.round((wishes.filter(w => w.completed).length / wishes.length) * 100), [wishes]);

            useEffect(() => {
                if (!window.fb) return;
                const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, u => { if (u) setUser(u); });
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot } = window.fb;
                const path = c => collection(db, 'artifacts', appId, 'public', 'data', c);
                
                onSnapshot(path('wishes'), snap => { setWishes(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); });
                onSnapshot(path('cities'), snap => { setCities(snap.docs.map(d => ({ id: d.id, ...d.data() }))); });
                onSnapshot(path('notes'), snap => { setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() }))); });
                onSnapshot(path('events'), snap => { 
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setEvents(data.sort((a,b) => {
                        const sA = getDateStatus(a.date);
                        const sB = getDateStatus(b.date);
                        if(sA.isSoon !== sB.isSoon) return sA.isSoon ? -1 : 1;
                        return sA.daysToAnniv - sB.daysToAnniv;
                    })); 
                });
                onSnapshot(path('profiles'), snap => { const d = { A: {}, B: {} }; snap.docs.forEach(doc => { d[doc.id] = doc.data(); }); setProfiles(d); });
            }, [user]);

            const groupedFootprints = useMemo(() => {
                const all = [
                    ...cities.map(c => ({ ...c, type: 'manual' })),
                    ...wishes.filter(w => w.completed && w.location).map(w => ({ id: `wish-${w.id}`, text: w.text, name: w.location, type: 'wish' }))
                ];
                return all.reduce((acc, f) => {
                    const name = normalName(f.name);
                    if (!acc[name]) acc[name] = [];
                    acc[name].push(f);
                    return acc;
                }, {});
            }, [cities, wishes]);

            const saveProfile = (s, d) => window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'profiles', s), d);
            const clearMines = s => saveProfile(s, { ...profiles[s], innerWorld: "" });

            const addWish = async e => {
                e.preventDefault(); if (!newWish.trim()) return;
                const loc = wishCounty && wishTown ? `${wishCounty}${wishTown}` : (wishTown || "");
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes'), { 
                    text: newWish, location: loc, targetDate: wishDate, creatorSide: mySide, completed: false, createdAt: window.fb.serverTimestamp() 
                });
                setNewWish(''); setWishCounty(''); setWishTown(''); setWishDate('');
            };

            const addEvent = async e => {
                e.preventDefault(); if (!evtT.trim() || !evtD) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'events'), { title: evtT, date: evtD, color: evtC, createdAt: window.fb.serverTimestamp() });
                setEvtT(''); setEvtD(''); setShowEvtForm(false);
            };

            const addCity = async e => {
                e.preventDefault();
                const loc = cityCounty && cityTown ? `${cityCounty}${cityTown}` : (cityTown || "");
                if (!loc) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'cities'), { 
                    name: loc, date: cityDate, creatorSide: mySide, createdAt: window.fb.serverTimestamp() 
                });
                setCityCounty(''); setCityTown(''); setCityDate(''); setShowCityForm(false);
            };

            const addNote = async e => {
                e.preventDefault(); if (!newNote.trim()) return;
                await window.fb.addDoc(window.fb.collection(window.fb.db, 'artifacts', appId, 'public', 'data', 'notes'), { text: newNote, creatorSide: mySide, seen: false, createdAt: window.fb.serverTimestamp() });
                setNewNote('');
            };

            const deleteItem = async (col, id) => { await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', col, id)); };

            if (loading) return <div className="min-h-screen flex items-center justify-center text-emerald-500 font-bold">同步森林魔法中...</div>;

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-slate-600 pb-32">
                    
                    {/* 彈窗：悄悄話 */}
                    {showGuardian && (
                        <div className="fixed inset-0 z-[100] bg-emerald-950/40 backdrop-blur-xl animate-in fade-in overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12 text-center">
                                <div className="flex items-center justify-between mb-8 px-2">
                                    <button onClick={() => setShowGuardian(false)} className="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white border border-white/30 tap-active"><Icon name="X" size={24} /></button>
                                    <div className="text-center">
                                        <h2 className="font-black text-2xl text-white drop-shadow-md tracking-widest">深夜信箋</h2>
                                        <p className="text-[10px] font-bold text-emerald-300 uppercase tracking-[0.3em] opacity-80">Guardian Whispers</p>
                                    </div>
                                    <div className="w-12 h-12"></div>
                                </div>
                                
                                <div className="bg-white/90 backdrop-blur-2xl rounded-[3rem] p-8 shadow-2xl border-2 border-emerald-100/50 mb-10 text-center ring-8 ring-white/10">
                                    <form onSubmit={addNote} className="space-y-4">
                                        <textarea 
                                            value={newNote} 
                                            onChange={e=>setNewNote(e.target.value)} 
                                            placeholder="寫下那些希望你聽見的悄悄話..." 
                                            className="w-full h-36 bg-slate-50/50 rounded-[2rem] p-6 text-sm font-medium border-none outline-none focus:bg-white text-center italic placeholder:text-slate-300 transition-all shadow-inner" 
                                        />
                                        <button type="submit" disabled={!newNote.trim()} className={`w-full py-4 ${PARTNERS[mySide].accent} text-white rounded-[2rem] font-black text-sm shadow-xl active:scale-95 flex items-center justify-center gap-2`}>
                                            <Icon name="Mail" size={18} fill="currentColor" /> 封存並傳遞
                                        </button>
                                    </form>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {notes.map((note, idx) => {
                                        const side = PARTNERS[note.creatorSide || 'A'];
                                        return (
                                            <div key={note.id} className={`p-7 rounded-[2.8rem] float-cloud whisper-card ${note.seen ? 'opacity-50 grayscale scale-95' : 'whisper-unread'} relative overflow-hidden`} style={{ animationDelay: `${idx * 0.7}s` }}>
                                                {!note.seen && <div className="absolute -top-1 -right-1 text-yellow-400 animate-pulse"><Icon name="Sparkles" size={24} fill="currentColor" /></div>}
                                                <div className="flex justify-between mb-5 items-center">
                                                    <span className={`w-9 h-9 rounded-full flex items-center justify-center text-[10px] font-black text-white ${side.accent} ring-4 ring-white shadow-lg`}>{side.displayName[0]}</span>
                                                    <SafeDeleteBtn onDelete={() => deleteItem('notes', note.id)} />
                                                </div>
                                                <p className={`text-slate-700 font-bold mb-8 text-base leading-relaxed text-left italic ${note.seen ? 'line-through' : ''}`}>「{note.text}」</p>
                                                <button onClick={() => window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'notes', note.id), { seen: !note.seen })} className={`w-full py-3 rounded-2xl text-[11px] font-black transition-all border flex items-center justify-center gap-2 ${note.seen ? 'bg-slate-100 text-slate-400 border-transparent' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>{note.seen ? '對方已領會' : '我收到了這份心意'}</button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 彈窗：絕密卷宗 */}
                    {showProfiles && (
                        <div className="fixed inset-0 z-[100] bg-white/60 backdrop-blur-2xl animate-in fade-in overflow-y-auto">
                            <div className="max-w-xl mx-auto px-6 py-12 text-center">
                                <div className="flex items-center justify-between mb-10 px-2">
                                    <button onClick={() => setShowProfiles(false)} className="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 tap-active shadow-sm"><Icon name="X" size={24} /></button>
                                    <h2 className="font-black text-xl text-slate-800 uppercase tracking-widest">物理絕密卷宗</h2>
                                    <div className="w-12 h-12"></div>
                                </div>
                                {Object.values(PARTNERS).map(config => {
                                    const data = profiles[config.id] || {};
                                    const fields = [{l:'海拔高度', k:'height'}, {l:'佔地總重', k:'weight'}, {l:'足跡印記', k:'shoeSize'}, {l:'林木色調', k:'favColor'}];
                                    return (
                                        <div key={config.id} className={`w-full bg-white rounded-[2.5rem] p-8 border-2 ${config.border} shadow-xl mb-6 relative overflow-hidden text-center`}>
                                            <div className="flex justify-between items-center mb-6 px-2">
                                                <div className="flex items-center gap-4 text-left">
                                                    <div className={`w-12 h-12 rounded-[1.2rem] ${config.accent} flex items-center justify-center text-white shadow-lg`}><Icon name="Shield" size={24} fill="white" /></div>
                                                    <h3 className={`font-black text-xl ${config.text}`}>{config.displayName} 密件</h3>
                                                </div>
                                                <SafeDeleteBtn onDelete={() => saveProfile(config.id, {})} />
                                            </div>
                                            <div className="grid grid-cols-1 gap-4">
                                                {fields.map(f => (
                                                    <div key={f.k} className="flex flex-col border-b border-slate-50 pb-3">
                                                        <span className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-1">{f.l}</span>
                                                        <input value={data[f.k] || ''} onChange={e => saveProfile(config.id, {...data, [f.k]: e.target.value})} className="bg-slate-50 border-none rounded-xl px-3 py-1 text-sm font-bold outline-none placeholder:text-slate-300 text-center" placeholder="待填寫" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <header className="bg-white/80 backdrop-blur-xl sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-emerald-50 shadow-sm text-center">
                        <div className="flex items-center gap-3"><Icon name="Heart" className="text-emerald-500 animate-pulse" /><h1 className="font-black text-lg text-emerald-800">夢想森林</h1></div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setShowGuardian(true)} className="p-2.5 bg-yellow-50 rounded-2xl text-yellow-600 border border-yellow-100 shadow-sm tap-active"><Icon name="Wand2" size={20} /></button>
                            <button onClick={() => setShowProfiles(true)} className="p-2.5 bg-emerald-50 rounded-2xl text-emerald-600 border border-emerald-100 shadow-sm tap-active"><Icon name="Shield" size={20} /></button>
                            <div className="flex bg-slate-100/50 p-1 rounded-2xl border border-slate-100">
                                {['A', 'B'].map(p => (
                                    <button key={p} onClick={() => setMySide(p)} className={`px-4 py-1.5 rounded-xl text-xs font-bold transition-all ${mySide === p ? `${PARTNERS[p].accent} text-white shadow-md` : 'text-slate-300'}`}>{PARTNERS[p].displayName}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 mt-8 space-y-12 text-center">
                        <LoveTree progress={progress} isGrowing={isGrowing} />

                        {/* 心情雷達 */}
                        <section className="space-y-4">
                            <div className="flex items-center gap-2 mb-2 px-1 text-slate-400 font-black uppercase tracking-widest text-xs justify-center">森林絕密：心情雷達系統</div>
                            <InlineLandmineSystem side="A" data={profiles.A} onSave={saveProfile} onDelete={clearMines} />
                            <InlineLandmineSystem side="B" data={profiles.B} onSave={saveProfile} onDelete={clearMines} />
                        </section>

                        {/* 歲月星光紀錄儀 */}
                        <section>
                            <div className="flex justify-between items-center mb-5 px-1 text-left">
                                <div className="flex items-center gap-2 text-slate-400"><Icon name="Calendar" size={16} /><h3 className="text-xs font-black uppercase tracking-[0.2em]">歲月星光紀錄儀</h3></div>
                                <button onClick={() => setShowEvtForm(!showEvtForm)} className="text-xs font-black bg-white border border-slate-200 px-4 py-1.5 rounded-full text-slate-400 hover:text-emerald-500 tap-active shadow-sm transition-all">{showEvtForm ? '取消' : '+ 記下日子'}</button>
                            </div>
                            {showEvtForm && (
                                <form onSubmit={addEvent} className="bg-white p-7 rounded-[2.5rem] border border-emerald-50 shadow-2xl mb-8 space-y-5 animate-in slide-in-from-top-4 relative z-20">
                                    <input placeholder="回憶標題..." className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner text-center placeholder:text-slate-300" value={evtT} onChange={e=>setEvtT(e.target.value)} required />
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner text-center cursor-pointer" value={evtD} onChange={e=>setEvtD(e.target.value)} required />
                                    <div className="flex justify-center gap-4 py-2">
                                        {MEMORY_COLORS.map(c => (<button key={c.id} type="button" onClick={() => setEvtC(c.id)} className={`w-8 h-8 rounded-full border-4 transition-all ${evtC === c.id ? 'scale-125 border-emerald-100 shadow-md' : 'border-transparent opacity-60'}`} style={{ backgroundColor: c.hex }} />))}
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-emerald-400 text-white rounded-2xl font-black text-sm shadow-xl tap-active active:scale-95 transition-all">儲存時光</button>
                                </form>
                            )}
                            <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide snap-x">
                                {events.map(event => {
                                    const status = getDateStatus(event.date);
                                    const colorObj = MEMORY_COLORS.find(c => c.id === event.color) || MEMORY_COLORS[0];
                                    return (
                                        <div key={event.id} className={`min-w-[170px] bg-white p-6 rounded-[2.5rem] border border-emerald-50 shadow-sm text-center group snap-start transition-all hover:shadow-md relative ${status.isSoon ? 'reminder-glow ring-2 ring-rose-300' : ''}`}>
                                            <SafeDeleteBtn onDelete={() => deleteItem('events', event.id)} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100" />
                                            {status.isSoon && <div className="absolute -top-2 left-1/2 -translate-x-1/2 px-3 py-1 bg-rose-400 text-white text-[9px] font-black rounded-full shadow-lg animate-bounce flex items-center gap-1"><Icon name="Sparkles" size={10} fill="currentColor" /> 即將到來</div>}
                                            <div className={`w-12 h-12 mb-4 rounded-2xl mx-auto flex items-center justify-center shadow-inner ${colorObj.bg} ${colorObj.text}`}><Icon name="Heart" size={24} fill="currentColor" /></div>
                                            <h4 className="text-[11px] font-black text-slate-500 truncate mb-1">{event.title}</h4>
                                            <p className="text-[9px] font-black text-slate-300 mb-2">{event.date.replace(/-/g, " . ")}</p>
                                            <div className="flex flex-col"><p className={`text-2xl font-black tracking-tighter ${status.isSoon ? 'text-rose-400' : 'text-slate-800'}`}>{status.diff.toLocaleString()}</p><span className="text-[10px] font-black opacity-30 uppercase tracking-widest leading-none">累計/倒數</span></div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {/* 投遞願望瓶 */}
                        <section className="bg-white rounded-[3rem] p-8 shadow-2xl border-2 border-emerald-50 text-center">
                            <h3 className="text-sm font-black text-emerald-800 mb-6 flex items-center gap-2 justify-center"><Icon name="Plus" size={16} /> 投遞心願瓶</h3>
                            <form onSubmit={addWish} className="space-y-4">
                                <textarea value={newWish} onChange={e=>setNewWish(e.target.value)} placeholder="想一起做什麼夢？" className="w-full p-4 rounded-2xl border-none outline-none h-24 text-center text-lg resize-none input-pale has-value shadow-inner" />
                                <LocationPicker county={wishCounty} town={wishTown} onCountyChange={setWishCounty} onTownChange={setWishTown} isOptional={true} />
                                <div className="relative">
                                    <input type="date" value={wishDate} onChange={e=>setWishDate(e.target.value)} className={`w-full p-4 pl-12 rounded-2xl border-none outline-none text-sm font-bold text-center cursor-pointer shadow-inner input-pale ${wishDate ? 'has-value' : ''}`} />
                                    <Icon name="Calendar" size={14} className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300" />
                                    {!wishDate && <span className="absolute left-12 top-1/2 -translate-y-1/2 text-sm text-slate-300 pointer-events-none">預計日期 (選填)</span>}
                                </div>
                                <button type="submit" disabled={!newWish.trim()} className={`w-full py-5 ${PARTNERS[mySide].accent} text-white rounded-[2rem] font-black text-md shadow-xl tap-active active:scale-95 transition-all`}>擲向森林 🍾</button>
                            </form>
                        </section>

                        {/* 精確地圖 & 足跡成長系統 */}
                        <section className="space-y-6 text-center">
                            <div className="flex justify-between items-center px-2 text-left">
                                <div>
                                    <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                        <Icon name="Sprout" size={14} className="text-emerald-500" /> 森林足跡進化地圖
                                    </h3>
                                    <p className="text-[9px] text-slate-300 font-bold mt-1">造訪多次的地方會長成大樹喔！</p>
                                </div>
                                <button onClick={() => setShowCityForm(!showCityForm)} className="text-xs font-bold text-emerald-500 hover:underline">{showCityForm ? '取消' : '+ 新增足跡'}</button>
                            </div>

                            {showCityForm && (
                                <div className="bg-emerald-50 p-6 rounded-[2.5rem] border-2 border-emerald-100 animate-in slide-in-from-top-4 text-center">
                                    <form onSubmit={addCity} className="space-y-4">
                                        <LocationPicker county={cityCounty} town={cityTown} onCountyChange={setCityCounty} onTownChange={setCityTown} isOptional={false} />
                                        <div className="relative">
                                            <input type="date" value={cityDate} onChange={e=>setCityDate(e.target.value)} className={`w-full p-4 pl-12 rounded-2xl border-none outline-none text-sm font-bold text-center cursor-pointer shadow-inner input-pale ${cityDate ? 'has-value' : ''}`} />
                                            <Icon name="Calendar" size={14} className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300" />
                                            {!cityDate && <span className="absolute left-12 top-1/2 -translate-y-1/2 text-sm text-slate-300 pointer-events-none">抵達日期 (必填)</span>}
                                        </div>
                                        <button type="submit" disabled={!cityCounty || !cityTown || !cityDate} className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black text-sm shadow-lg shadow-emerald-200/50">點亮這份回憶 🌱</button>
                                    </form>
                                </div>
                            )}

                            <div className="relative w-full h-[550px] bg-white rounded-[3.5rem] border-2 border-emerald-50 shadow-inner overflow-hidden mx-auto">
                                <TaiwanProfessionalMap groupedFootprints={groupedFootprints} onCountyClick={(n) => setHistoryCity(n)} />
                                <div className="absolute inset-0 pointer-events-none">
                                    {Object.entries(groupedFootprints).map(([cityName, records]) => {
                                        const pos = getMapPos(cityName);
                                        const count = records.length;
                                        const isWish = records.some(r => r.type === 'wish');
                                        
                                        // 根據次數決定圖示與樣式
                                        const getGrowthStyle = () => {
                                            if (count === 1) return { icon: 'Flower', color: 'text-rose-400', size: 16 };
                                            if (count === 2) return { icon: 'Sprout', color: 'text-emerald-400', size: 20 };
                                            return { icon: 'TreePine', color: 'text-emerald-600', size: 24 };
                                        };
                                        const style = getGrowthStyle();

                                        return (
                                            <div key={cityName} className="absolute -translate-x-1/2 -translate-y-1/2 pointer-events-auto cursor-pointer" style={{ left: pos.x, top: pos.y }} onClick={() => setHistoryCity(cityName)}>
                                                <div className={`city-dot-pop flex items-center justify-center ${style.color} bg-white rounded-full p-1 shadow-md ring-2 ring-emerald-50 hover:scale-150 transition-all`}>
                                                    <Icon name={style.icon} size={style.size} fill="currentColor" className={count >= 3 ? "animate-pulse" : ""} />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </section>

                        {/* 願望瓶列表 */}
                        <div className="space-y-6 text-center">
                            {wishes.map(item => (
                                <div key={item.id} className={`p-6 rounded-[3.5rem] border-2 ${item.completed ? 'opacity-50 grayscale bg-slate-50' : `${PARTNERS[item.creatorSide].border} bg-white shadow-xl`} text-center`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <span className={`text-[10px] font-black uppercase px-4 py-1 rounded-full ${item.completed ? 'bg-slate-300' : PARTNERS[item.creatorSide].accent} text-white`}>願望瓶</span>
                                        <SafeDeleteBtn onDelete={() => deleteItem('wishes', item.id)} />
                                    </div>
                                    <p className="text-lg font-bold text-slate-800 mb-6 text-left px-2">{item.text}</p>
                                    <div className="flex flex-wrap gap-2 px-2">
                                        {item.location && <span className="text-[10px] font-bold bg-slate-50 px-3 py-1.5 rounded-xl text-emerald-600 flex items-center gap-1.5 shadow-sm"><Icon name="MapPin" size={10} fill="currentColor" /> {item.location}</span>}
                                        {item.targetDate && <span className="text-[10px] font-bold bg-slate-50 px-3 py-1.5 rounded-xl text-slate-500 flex items-center gap-1.5 shadow-sm"><Icon name="Calendar" size={10} className="text-rose-300" /> {item.targetDate.replace(/-/g, " . ")}</span>}
                                        <button onClick={() => {
                                            const next = !item.completed;
                                            if (next) { setIsGrowing(true); setTimeout(() => setIsGrowing(false), 1500); }
                                            window.fb.updateDoc(window.fb.doc(window.fb.db, 'artifacts', appId, 'public', 'data', 'wishes', item.id), { completed: next });
                                        }} className={`ml-auto px-7 py-2.5 rounded-full text-[11px] font-black transition-all tap-active ${item.completed ? 'bg-emerald-500 text-white shadow-none' : 'bg-white border border-slate-100 text-slate-300 hover:border-emerald-200 hover:text-emerald-500 shadow-sm'}`}>{item.completed ? '願望達成' : '灌溉願望'}</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 彈窗：回憶詳情 */}
                    {historyCity && (
                        <div className="fixed inset-0 z-[110] bg-emerald-900/10 backdrop-blur-xl flex items-center justify-center p-6 text-center" onClick={() => setHistoryCity(null)}>
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-2 border-emerald-100" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h2 className="font-black text-xl text-emerald-800">{historyCity}</h2>
                                        <p className="text-[9px] font-bold text-emerald-400 text-left">共累積 {groupedFootprints[historyCity]?.length || 0} 個回憶</p>
                                    </div>
                                    <button onClick={() => setHistoryCity(null)} className="p-2 text-slate-300 hover:text-emerald-500"><Icon name="X" /></button>
                                </div>
                                <div className="space-y-4 max-h-[300px] overflow-y-auto pr-2 scrollbar-hide">
                                    {groupedFootprints[historyCity]?.sort((a,b) => new Date(b.date) - new Date(a.date)).map((rec, i) => (
                                        <div key={i} className="flex items-start gap-3 border-b border-emerald-50 pb-3 last:border-none text-left">
                                            <div className="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center text-emerald-500 shrink-0">
                                                <Icon name={rec.type === 'wish' ? 'Plane' : 'TreePine'} size={16} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-300">{rec.date ? rec.date.replace(/-/g, ".") : '神祕某日'}</p>
                                                <p className="text-sm font-bold text-slate-700 leading-relaxed">{rec.type === 'wish' ? `願望：${rec.text}` : '抵達森林足跡'}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {(!groupedFootprints[historyCity] || groupedFootprints[historyCity].length === 0) && <p className="text-slate-300 text-xs italic text-center">這裡是尚未探索的森林邊緣...</p>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
